<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>我的博物馆 · 修</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script>/*AD_INLINED*/
/* ================================================================
   修 · 广告位 + 打赏组件
   - Ad.openLamp({...})    关卡完成「添灯」
   - Ad.openSkin({...})    博物馆皮肤「供奉」
   - Ad.openRevive({...})  小考「翻签」
   - Ad.openRubbing({...}) 通关「拓片礼」
   - Ad.getLamps() / Ad.spendLamps(n)  灯油会计
   状态: localStorage.lamps (int) / localStorage.adseen.{key} (1)
=================================================================*/
(function(){
  if(window.Ad) return;

  /* ---------- styles ---------- */
  const css = `
  .ad-mask{position:fixed;inset:0;background:rgba(8,6,4,.78);backdrop-filter:blur(6px);
    z-index:9000;display:flex;align-items:center;justify-content:center;
    animation:adFade .4s ease;font-family:"Noto Serif SC",serif;}
  .ad-card{width:min(440px,90vw);background:linear-gradient(180deg,#1a1612,#0e0a08);
    border:1px solid rgba(200,150,90,.3);padding:32px 28px;color:#f2e7d0;
    box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;}
  .ad-close{position:absolute;top:10px;right:14px;width:24px;height:24px;
    background:none;border:none;color:rgba(242,231,208,.4);cursor:pointer;font-size:18px;}
  .ad-close:hover{color:#c8965a;}
  .ad-lantern{width:60px;height:78px;margin:0 auto 14px;position:relative;
    animation:adRise 2.2s ease-in-out infinite alternate;}
  .ad-lantern::before{content:"";position:absolute;inset:8px 6px 12px 6px;
    background:radial-gradient(ellipse at center,#ffd98a 0%,#c87a2a 70%,#7a3a18 100%);
    border-radius:50% / 60%;box-shadow:0 0 30px rgba(255,180,80,.5),inset 0 0 12px rgba(80,30,10,.4);}
  .ad-lantern::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:30px;height:6px;background:#3a2618;border-radius:2px;}
  .ad-title{text-align:center;font-size:18px;letter-spacing:.3em;color:#c8965a;margin-bottom:10px;}
  .ad-sub{text-align:center;font-size:12px;letter-spacing:.15em;color:rgba(242,231,208,.6);margin-bottom:18px;line-height:1.8;}
  .ad-reward{margin:18px 0;padding:12px 14px;background:rgba(200,150,90,.06);
    border-left:2px solid #c8965a;font-size:12px;letter-spacing:.1em;color:#e6c898;}
  .ad-actions{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
  .ad-btn{padding:13px;font-size:12px;letter-spacing:.4em;cursor:pointer;
    transition:all .3s ease;font-family:inherit;border:none;}
  .ad-btn-primary{background:#a83a2a;color:#f2e7d0;}
  .ad-btn-primary:hover{background:#c44a3a;transform:translateY(-1px);}
  .ad-btn-ghost{background:transparent;color:#c8965a;border:1px solid rgba(200,150,90,.4);}
  .ad-btn-ghost:hover{background:rgba(200,150,90,.1);}
  .ad-btn-skip{background:transparent;color:rgba(242,231,208,.4);font-size:11px;letter-spacing:.3em;}
  .ad-btn-skip:hover{color:rgba(242,231,208,.7);}
  .ad-foot{margin-top:14px;text-align:center;font-size:10px;letter-spacing:.3em;color:rgba(242,231,208,.3);}
  .ad-lamps{display:inline-block;margin-left:8px;color:#c8965a;}

  /* ====== 广告播放阶段 ====== */
  .ad-play{padding:40px 28px;text-align:center;}
  .ad-play .smoke{width:80px;height:80px;margin:0 auto 18px;position:relative;}
  .ad-play .smoke::before,.ad-play .smoke::after{content:"";position:absolute;left:50%;bottom:0;
    width:14px;height:14px;background:rgba(200,150,90,.3);border-radius:50%;
    animation:adSmoke 2.4s linear infinite;}
  .ad-play .smoke::after{animation-delay:1.2s;}
  .ad-play .incense{position:absolute;left:calc(50% - 1px);bottom:0;width:2px;height:60px;
    background:linear-gradient(180deg,#c87a2a,#3a2618);}
  .ad-play .glow{position:absolute;left:calc(50% - 4px);top:14px;width:8px;height:8px;
    background:#ffaa55;border-radius:50%;box-shadow:0 0 16px #ff8833;}
  .ad-play h3{font-size:15px;letter-spacing:.3em;color:#c8965a;margin-bottom:10px;}
  .ad-play .sponsor{font-size:11px;letter-spacing:.25em;color:rgba(242,231,208,.45);margin-bottom:22px;}
  .ad-bar{width:100%;height:3px;background:rgba(242,231,208,.1);overflow:hidden;margin-bottom:8px;}
  .ad-bar span{display:block;height:100%;background:linear-gradient(90deg,#c87a2a,#ffd98a);width:0;}
  .ad-time{font-size:11px;letter-spacing:.2em;color:rgba(242,231,208,.5);}
  .ad-skip-late{margin-top:18px;font-size:10px;letter-spacing:.3em;color:rgba(242,231,208,.3);}

  /* ====== 打赏 ====== */
  .tea-card{text-align:center;padding:30px 24px;}
  .tea-card h3{font-size:16px;letter-spacing:.3em;color:#c8965a;margin-bottom:6px;}
  .tea-card .tea-sub{font-size:11px;letter-spacing:.25em;color:rgba(242,231,208,.5);margin-bottom:20px;}
  .tea-amts{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
  .tea-amts button{flex:1;padding:14px 0;font-size:13px;letter-spacing:.2em;
    border:1px solid rgba(200,150,90,.4);background:transparent;color:#c8965a;cursor:pointer;transition:.3s;}
  .tea-amts button:hover{background:rgba(200,150,90,.1);}
  .tea-qr{width:160px;height:160px;margin:0 auto 12px;background:#f2e7d0;
    display:flex;align-items:center;justify-content:center;font-size:11px;color:#3a2618;letter-spacing:.2em;text-align:center;line-height:1.6;}
  .tea-tip{font-size:11px;letter-spacing:.2em;color:rgba(242,231,208,.45);}

  @keyframes adFade{from{opacity:0}to{opacity:1}}
  @keyframes adRise{from{transform:translateY(2px)}to{transform:translateY(-4px)}}
  @keyframes adSmoke{
    0%{transform:translate(-50%,0) scale(.6);opacity:.7}
    100%{transform:translate(-50%,-80px) scale(2);opacity:0}
  }
  `;
  const s = document.createElement("style");
  s.textContent = css;
  document.head.appendChild(s);

  /* ---------- state ---------- */
  function readInt(k){ try{ return parseInt(localStorage.getItem(k))||0; }catch(e){ return 0; } }
  function writeInt(k,v){ try{ localStorage.setItem(k,String(v)); }catch(e){} }

  function makeMask(){
    const m = document.createElement("div");
    m.className = "ad-mask";
    document.body.appendChild(m);
    return m;
  }
  function close(mask){ if(mask && mask.parentNode) mask.parentNode.removeChild(mask); }

  /* ---------- 15s ad playback ---------- */
  function playAd(mask, opts){
    const dur = opts.duration || 15;
    const card = mask.querySelector(".ad-card");
    card.innerHTML = `
      <div class="ad-play">
        <div class="smoke">
          <div class="incense"></div><div class="glow"></div>
        </div>
        <h3>致 谢 方 · 一 炷 香</h3>
        <div class="sponsor">${opts.sponsor || "本期由「中国国家博物馆 · 文创」轻致谢"}</div>
        <div class="ad-bar"><span id="adBar"></span></div>
        <div class="ad-time"><span id="adTime">${dur}</span> s</div>
        <div class="ad-skip-late" id="adSkipLate" hidden>5 秒后可跳过</div>
      </div>
    `;
    const bar = card.querySelector("#adBar");
    const time = card.querySelector("#adTime");
    const skipEl = card.querySelector("#adSkipLate");
    let start = performance.now();
    let cancelled = false;
    let skippable = false;
    setTimeout(()=>{ skippable = true; skipEl.hidden = false; skipEl.textContent = "提 前 跳 过"; skipEl.style.cursor="pointer"; skipEl.onclick=()=>{ if(skippable){ finish(true); } }; }, Math.min(10000, dur*1000*0.7));
    function tick(){
      if(cancelled) return;
      const t = (performance.now() - start) / 1000;
      const p = Math.min(1, t/dur);
      bar.style.width = (p*100)+"%";
      time.textContent = Math.max(0, Math.ceil(dur - t));
      if(p >= 1){ finish(false); return; }
      requestAnimationFrame(tick);
    }
    function finish(early){
      cancelled = true;
      close(mask);
      // 给奖励
      if(opts.onComplete) opts.onComplete(early);
    }
    tick();
  }

  /* ---------- tea jar ---------- */
  function showTea(){
    const mask = makeMask();
    const card = document.createElement("div");
    card.className = "ad-card";
    card.innerHTML = `
      <button class="ad-close">×</button>
      <div class="tea-card">
        <h3>请 创 作 者 一 杯 茶</h3>
        <div class="tea-sub">你的心意会让这件治愈小作品走得更远</div>
        <div class="tea-amts">
          <button data-a="1">¥ 1</button>
          <button data-a="3">¥ 3</button>
          <button data-a="6">¥ 6</button>
        </div>
        <div class="tea-qr">微信赞赏码<br/>（正式版显示）</div>
        <div class="tea-tip">长按识别 · 或截图保存</div>
      </div>
    `;
    mask.appendChild(card);
    card.querySelector(".ad-close").onclick = ()=>close(mask);
    mask.onclick = e=>{ if(e.target === mask) close(mask); };
    card.querySelectorAll(".tea-amts button").forEach(b=>{
      b.onclick = ()=>{
        const a = b.dataset.a;
        card.querySelector(".tea-qr").innerHTML = `请扫码支付 ¥${a}<br/><span style="font-size:9px;color:#7a4a2a;">（演示二维码）</span>`;
      };
    });
  }

  /* ================ API ================ */
  const Ad = {
    getLamps(){ return readInt("lamps"); },
    addLamps(n){ writeInt("lamps", readInt("lamps")+n); },
    spendLamps(n){
      const cur = readInt("lamps");
      if(cur < n) return false;
      writeInt("lamps", cur - n);
      return true;
    },

    /* ---------- P0 关卡完成「添灯」 ---------- */
    openLamp(opts){
      // opts: { artifact, lampKey, onReward, onSkip, allowTea=true }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      const lamps = this.getLamps();
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">添 一 盏 灯</div>
        <div class="ad-sub">
          为这件 ${opts.artifact||"文物"} 添一盏灯，<br/>
          唤回它更多的记忆 ——
        </div>
        <div class="ad-reward">
          · 解 锁 完 整 图 鉴（高清出土照 · 修复师手记）<br/>
          · 获 得 一 盏 灯 油（可供奉博物馆皮肤）
        </div>
        <div class="ad-actions">
          <button class="ad-btn ad-btn-primary" id="adGo">添 灯（约 15 秒）</button>
          ${opts.allowTea === false ? "" : `<button class="ad-btn ad-btn-ghost" id="adTea">请 作 者 一 杯 茶</button>`}
          <button class="ad-btn ad-btn-skip" id="adSkip">素 心 而 过</button>
        </div>
        <div class="ad-foot">
          已添灯 <span class="ad-lamps">${lamps} 盏</span>
          · 今日添灯人次 ${(7000 + Math.floor(Math.random()*999)).toLocaleString()}
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#adSkip").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#adGo").onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「中国国家博物馆 · 文创」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            if(opts.lampKey){ try{ localStorage.setItem("adseen."+opts.lampKey, "1"); }catch(e){} }
            if(opts.onReward) opts.onReward();
          }
        });
      };
      const teaBtn = card.querySelector("#adTea");
      if(teaBtn) teaBtn.onclick = showTea;
    },

    /* ---------- P1 博物馆皮肤「供奉」 ---------- */
    openSkin(opts){
      // opts: { skinName, needLamps, onUnlock, onCancel }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      const have = this.getLamps();
      const need = opts.needLamps || 3;
      const enough = have >= need;
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">供 奉 · ${opts.skinName||"限定皮肤"}</div>
        <div class="ad-sub">
          此皮肤需供奉 <span style="color:#c8965a">${need}</span> 盏灯油<br/>
          你现有 <span style="color:#c8965a">${have}</span> 盏
        </div>
        <div class="ad-reward" style="text-align:center;">
          ${enough
            ? `灯油已足 · 一键供奉即可点亮`
            : `还差 ${need-have} 盏 · 可即时添灯补足`}
        </div>
        <div class="ad-actions">
          ${enough
            ? `<button class="ad-btn ad-btn-primary" id="skinGo">供 奉 · 点 亮 皮 肤</button>`
            : `<button class="ad-btn ad-btn-primary" id="skinAdd">添 一 盏 灯（约 15 秒）</button>`}
          <button class="ad-btn ad-btn-ghost" id="skinTea">请 作 者 一 杯 茶</button>
          <button class="ad-btn ad-btn-skip" id="skinSkip">改 日 再 来</button>
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onCancel) opts.onCancel(); };
      card.querySelector("#skinSkip").onclick = ()=>{ close(mask); if(opts.onCancel) opts.onCancel(); };
      card.querySelector("#skinTea").onclick = showTea;
      const go = card.querySelector("#skinGo");
      if(go) go.onclick = ()=>{
        Ad.spendLamps(need);
        close(mask);
        if(opts.onUnlock) opts.onUnlock();
      };
      const add = card.querySelector("#skinAdd");
      if(add) add.onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「故宫文创」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            // 重新打开（更新进度）
            setTimeout(()=>Ad.openSkin(opts), 200);
          }
        });
      };
    },

    /* ---------- P2 小考「翻签」 ---------- */
    openRevive(opts){
      // opts: { onRevive, onGiveUp }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">这 一 签 · 未 中</div>
        <div class="ad-sub">
          要不要翻一支救签？<br/>
          翻签可多得一次答题机会
        </div>
        <div class="ad-actions">
          <button class="ad-btn ad-btn-primary" id="revGo">翻 签（约 15 秒）</button>
          <button class="ad-btn ad-btn-skip" id="revSkip">认 命 · 重 开</button>
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onGiveUp) opts.onGiveUp(); };
      card.querySelector("#revSkip").onclick = ()=>{ close(mask); if(opts.onGiveUp) opts.onGiveUp(); };
      card.querySelector("#revGo").onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「上海博物馆 · 数字展」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            if(opts.onRevive) opts.onRevive();
          }
        });
      };
    },

    /* ---------- P3 通关「拓片礼」 ---------- */
    openRubbing(opts){
      // opts: { chapter, onGenerate, onSkip }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">拓 片 留 念</div>
        <div class="ad-sub">
          为「${opts.chapter||"卷一·格物"}」通关<br/>
          制作一张你的修复拓片，可分享朋友圈
        </div>
        <div class="ad-reward">
          · 高 清 PNG · 含你修复过的全部文物<br/>
          · 可下载、可一键分享
        </div>
        <div class="ad-actions">
          <button class="ad-btn ad-btn-primary" id="rubGo">制 作 拓 片（约 15 秒）</button>
          <button class="ad-btn ad-btn-ghost" id="rubTea">请 作 者 一 杯 茶</button>
          <button class="ad-btn ad-btn-skip" id="rubSkip">下 次 再 说</button>
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#rubSkip").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#rubTea").onclick = showTea;
      card.querySelector("#rubGo").onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「陕西历史博物馆」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            if(opts.onGenerate) opts.onGenerate();
          }
        });
      };
    },

    showTea: showTea
  };

  window.Ad = Ad;
})();

</script>
<style>
  :root{
    --paper:#f3ece0;
    --paper-2:#e8dfce;
    --ink:#1a1a1a;
    --ink-soft:#3b3531;
    --ink-soft-2:#7a6f60;
    --gold:#b8860b;
    --gold-bright:#e6b450;
    --blue:#2b4a7a;
    --red:#9b2c2c;
    --wood:#6b4a2a;
    --wood-dark:#3e2814;
    --wall:#f5f3ee;
    --wall-shadow:rgba(60,40,20,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;font-family:"Noto Serif SC",serif;color:var(--ink);background:var(--paper);}
  body{
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(180,160,120,.06) 0, transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(120,90,60,.05) 0, transparent 60%),
      repeating-linear-gradient(45deg, rgba(0,0,0,.012) 0 1px, transparent 1px 6px);
    transition:background-color .6s ease;
  }
  body[data-skin="gallery"]{background-color:#ebe9e3;}
  button,a{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;text-decoration:none;}
  [hidden]{display:none!important;}

  /* —— topbar —— */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;border-bottom:1px solid rgba(0,0,0,.06);
    position:sticky;top:0;background:inherit;z-index:20;
    backdrop-filter:blur(6px);
  }
  .back{
    width:34px;height:34px;display:grid;place-items:center;
    border:1px solid rgba(0,0,0,.15);border-radius:50%;
    font-size:14px;color:var(--ink-soft);transition:all .3s;
  }
  .back:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .title-wrap{text-align:center;}
  .title-zh{font-size:14px;letter-spacing:.5em;color:var(--ink-soft);font-weight:500;}
  .stats{font-size:11px;letter-spacing:.15em;color:var(--ink-soft-2);margin-top:4px;}
  .stats span{color:var(--gold);}
  .icon-btn{
    width:34px;height:34px;display:grid;place-items:center;
    border:1px solid rgba(0,0,0,.15);border-radius:50%;
    font-size:14px;color:var(--ink-soft);transition:all .3s;
  }
  .icon-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* —— hall tab strip —— */
  .hall-tabs{
    display:flex;justify-content:center;gap:0;
    padding:14px 24px 0;
    border-bottom:1px solid rgba(0,0,0,.06);
    background:rgba(255,255,255,.3);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .hall-tab{
    flex:0 0 auto;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:10px 22px 14px;
    border-bottom:2px solid transparent;
    cursor:pointer;transition:all .25s;
    color:var(--ink-soft);
    font-family:inherit;background:none;border-left:none;border-right:none;border-top:none;
  }
  .hall-tab .ht-n{font-family:"Ma Shan Zheng",serif;font-size:14px;letter-spacing:.1em;color:var(--gold);opacity:.55;}
  .hall-tab .ht-name{font-size:13px;letter-spacing:.35em;font-weight:500;}
  .hall-tab .ht-cnt{font-size:9px;letter-spacing:.2em;color:var(--ink-soft);opacity:.75;}
  .hall-tab:hover{color:var(--ink);}
  .hall-tab:hover .ht-n{opacity:.9;}
  .hall-tab.active{color:var(--ink);border-bottom-color:var(--gold);background:rgba(184,134,11,.04);}
  .hall-tab.active .ht-n{opacity:1;}
  .hall-tab.locked{opacity:.5;cursor:not-allowed;}
  .hall-tab.locked::after{content:"未启";font-size:8px;letter-spacing:.2em;color:var(--ink-soft-2);margin-top:2px;}

  .hall-banner{
    text-align:center;padding:18px 24px 0;
  }
  .hall-banner .hb-cat{font-size:10px;letter-spacing:.5em;color:var(--gold);}
  .hall-banner .hb-title{font-family:"Ma Shan Zheng",serif;font-size:30px;letter-spacing:.4em;color:var(--ink);margin-top:6px;}
  .hall-banner .hb-story{
    max-width:560px;margin:14px auto 0;
    font-size:12px;line-height:2;letter-spacing:.08em;color:var(--ink-soft);
  }

  /* —— main stage —— */
  #stage{padding:40px 24px 80px;min-height:calc(100vh - 73px);}

  /* ------- SKIN A: 博古架 ------- */
  .shelf{
    max-width:880px;margin:0 auto;
    background:linear-gradient(180deg,#5a3a1e,#3e2814);
    padding:14px;
    border-radius:4px;
    box-shadow:0 18px 40px -10px rgba(60,30,10,.4), inset 0 0 0 1px rgba(0,0,0,.4);
    position:relative;
  }
  .shelf::before, .shelf::after{
    content:"";position:absolute;left:14px;right:14px;height:6px;
    background:linear-gradient(180deg,#7a5028,#3e2814);
    border-top:1px solid rgba(255,210,150,.15);
  }
  .shelf::before{top:8px;} .shelf::after{bottom:8px;}
  .shelf-grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    grid-template-rows:160px;
    gap:8px;padding:18px 8px;
  }
  .shelf-grid .niche.wide{grid-column:auto;}
  .shelf-grid .niche.tall{grid-row:auto;}
  .niche{
    background:radial-gradient(ellipse at 50% 30%, #2a1a0a, #150b04);
    border:1px solid rgba(0,0,0,.6);
    box-shadow:inset 0 4px 12px rgba(0,0,0,.7), inset 0 -1px 0 rgba(255,200,140,.08);
    display:grid;place-items:center;
    position:relative;cursor:pointer;
    transition:transform .3s;
    overflow:hidden;
  }
  .niche:hover{transform:translateY(-2px);}
  .niche.wide{grid-column:span 2;}
  .niche.tall{grid-row:span 1;}
  .niche-light{
    position:absolute;top:0;left:0;right:0;height:40%;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,210,150,.25), transparent 70%);
    pointer-events:none;
  }
  .niche-name{
    position:absolute;bottom:6px;left:0;right:0;
    text-align:center;font-size:10px;letter-spacing:.3em;
    color:rgba(230,200,160,.6);
  }
  .niche.empty .niche-name{color:rgba(200,180,150,.35);}

  /* ------- SKIN B: 白墙现代展厅 ------- */
  .gallery{
    max-width:1040px;margin:0 auto;
    background:var(--wall);
    padding:60px 40px 80px;
    border-radius:2px;
    box-shadow:0 30px 80px -20px rgba(40,30,20,.15);
    position:relative;
  }
  .gallery-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:60px 40px;
    margin-top:30px;
  }
  .pedestal{
    text-align:center;cursor:pointer;
    position:relative;
    transition:transform .4s;
  }
  .pedestal:hover{transform:translateY(-4px);}
  .pedestal-spot{
    position:absolute;top:-30px;left:50%;transform:translateX(-50%);
    width:140%;height:200px;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,250,235,.7), transparent 65%);
    pointer-events:none;z-index:0;
  }
  .pedestal-art{
    width:140px;height:140px;margin:0 auto 0;
    display:grid;place-items:center;
    position:relative;z-index:1;
  }
  .pedestal-base{
    width:160px;height:60px;margin:0 auto;
    background:linear-gradient(180deg,#fafaf6,#dcd6c8);
    box-shadow:0 14px 28px -8px rgba(60,40,20,.18), inset 0 1px 0 rgba(255,255,255,.6);
    position:relative;z-index:1;
  }
  .pedestal-label{
    margin-top:18px;font-size:11px;letter-spacing:.3em;color:var(--ink-soft);
    text-align:left;border-top:1px solid rgba(0,0,0,.15);padding-top:10px;
    display:inline-block;min-width:140px;
  }
  .pedestal-label .lbl-dyn{color:var(--gold);font-size:9px;letter-spacing:.4em;display:block;margin-bottom:4px;}
  .pedestal.empty .pedestal-label{color:var(--ink-soft-2);opacity:.6;}

  /* ------- SKIN C: 山水卷轴（locked preview） ------- */
  .scroll-locked{
    max-width:880px;margin:0 auto;text-align:center;
    padding:80px 40px;
    background:linear-gradient(180deg,rgba(220,210,190,.4),rgba(200,180,150,.6));
    border:1px solid rgba(120,90,60,.2);
    border-radius:2px;
    position:relative;
  }
  .scroll-locked .lock-icon{
    font-size:36px;color:var(--gold);margin-bottom:20px;
  }
  .scroll-locked h3{font-size:22px;letter-spacing:.3em;margin-bottom:14px;}
  .scroll-locked p{font-size:13px;line-height:2;color:var(--ink-soft);max-width:420px;margin:0 auto 28px;}
  .scroll-locked .price{
    display:inline-block;padding:12px 36px;background:var(--ink);color:var(--paper);
    font-size:13px;letter-spacing:.3em;transition:all .3s;
  }
  .scroll-locked .price:hover{background:var(--gold);}
  .scroll-locked .price s{opacity:.5;margin-right:10px;}

  /* ------- placeholder silhouette ------- */
  .silhouette{
    width:80%;height:70%;
    background:rgba(255,255,255,.06);
    border-radius:50%;
    display:grid;place-items:center;
    color:rgba(255,255,255,.25);
    font-size:24px;letter-spacing:.1em;
    border:1px dashed rgba(255,255,255,.15);
  }
  .gallery .silhouette{
    background:rgba(120,90,60,.04);
    border-color:rgba(120,90,60,.15);
    color:rgba(120,90,60,.4);
    width:100%;height:100%;border-radius:50%;
  }

  /* ------- skin drawer ------- */
  .skin-drawer{
    position:fixed;top:0;right:0;bottom:0;width:320px;
    background:var(--paper);
    box-shadow:-20px 0 50px -10px rgba(0,0,0,.18);
    z-index:40;padding:24px;
    transform:translateX(0);
    animation:slideIn .4s ease;
    display:flex;flex-direction:column;
  }
  @keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
  .skin-drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .dz-title{font-size:13px;letter-spacing:.5em;color:var(--ink-soft);}
  .x{font-size:22px;color:var(--ink-soft);width:28px;height:28px;}
  .skin-list{flex:1;display:flex;flex-direction:column;gap:14px;}
  .skin-opt{
    border:1px solid rgba(0,0,0,.1);padding:14px;
    display:flex;align-items:center;gap:14px;
    cursor:pointer;transition:all .3s;
    position:relative;
  }
  .skin-opt:hover{border-color:var(--ink);}
  .skin-opt.active{border-color:var(--gold);background:rgba(184,134,11,.06);}
  .skin-opt .swatch{
    width:48px;height:48px;flex-shrink:0;border-radius:2px;
    background:linear-gradient(180deg,#5a3a1e,#3e2814);
  }
  .skin-opt[data-skin="gallery"] .swatch{background:linear-gradient(180deg,#fafaf6,#dcd6c8);border:1px solid rgba(0,0,0,.1);}
  .skin-opt[data-skin="scroll"] .swatch{background:linear-gradient(180deg,rgba(220,210,190,.8),rgba(200,180,150,.9));}
  .skin-opt[data-skin="temple"] .swatch{background:linear-gradient(180deg,#a83a2a,#7a2a1a);}
  .skin-opt-meta{flex:1;}
  .skin-opt-name{font-size:13px;letter-spacing:.2em;}
  .skin-opt-desc{font-size:11px;color:var(--ink-soft-2);margin-top:4px;letter-spacing:.05em;}
  .skin-opt .lock{font-size:11px;color:var(--gold);}
  .skin-foot{font-size:10px;color:var(--ink-soft-2);text-align:center;letter-spacing:.2em;padding-top:16px;border-top:1px solid rgba(0,0,0,.06);}

  /* ------- detail drawer ------- */
  .detail{position:fixed;inset:0;z-index:50;display:grid;place-items:center;}
  .detail-mask{position:absolute;inset:0;background:rgba(20,15,10,.55);backdrop-filter:blur(4px);animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .detail-card{
    position:relative;z-index:1;
    width:min(960px,94vw);max-height:92vh;
    background:var(--paper);
    display:grid;grid-template-columns:1.1fr 1fr;
    overflow:hidden;
    animation:rise .5s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 30px 80px -10px rgba(0,0,0,.4);
  }
  @keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
  .detail-card .x{position:absolute;top:14px;right:14px;z-index:5;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.05);}
  .detail-stage{
    background:radial-gradient(ellipse at 50% 40%, #2a1a0a, #100804);
    display:grid;place-items:center;
    position:relative;
    padding:30px;
  }
  .detail-stage::before{
    content:"";position:absolute;top:0;left:0;right:0;height:50%;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,210,150,.18), transparent 70%);
    pointer-events:none;
  }
  .detail-canvas-wrap{position:relative;width:100%;aspect-ratio:1;max-width:380px;}
  .detail-canvas{width:100%;height:100%;cursor:grab;touch-action:none;}
  .detail-canvas:active{cursor:grabbing;}
  .rotate-hint{
    position:absolute;bottom:-30px;left:0;right:0;text-align:center;
    font-size:10px;letter-spacing:.4em;color:rgba(230,200,160,.5);
  }
  .detail-meta{padding:36px 32px;overflow-y:auto;}
  .meta-tag{font-size:10px;letter-spacing:.5em;color:var(--gold);padding-bottom:6px;border-bottom:1px solid var(--gold);display:inline-block;margin-bottom:14px;}
  .detail-meta h2{font-size:22px;letter-spacing:.15em;font-weight:600;margin-bottom:8px;}
  .meta-sub{font-size:11px;color:var(--ink-soft-2);letter-spacing:.15em;margin-bottom:24px;}

  .tabs{display:flex;gap:0;border-bottom:1px solid rgba(0,0,0,.1);margin-bottom:20px;}
  .tab{padding:10px 14px;font-size:12px;letter-spacing:.3em;color:var(--ink-soft-2);position:relative;transition:color .3s;}
  .tab.active{color:var(--ink);}
  .tab.active::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--gold);}

  .pane{display:none;}
  .pane.active{display:block;animation:fade .3s ease;}
  .pane p{font-size:13px;line-height:2;color:var(--ink-soft);margin-bottom:14px;}
  .pane .primary{
    padding:12px 24px;border:1px solid var(--ink);
    font-size:12px;letter-spacing:.3em;transition:all .3s;
  }
  .pane .primary:hover{background:var(--ink);color:var(--paper);}
  .micro-hint{font-size:10px;color:var(--ink-soft-2);letter-spacing:.2em;margin-top:14px;}

  /* knowledge tab styling */
  .know-card .story{background:rgba(184,134,11,.06);padding:14px 16px;border-left:2px solid var(--gold);font-size:12px;}

  /* share tab */
  .share-preview{
    background:linear-gradient(180deg,#fbf6ea,#ede2cc);
    padding:28px 22px;border-radius:4px;
    text-align:center;border:1px solid rgba(0,0,0,.08);
    margin-bottom:16px;
  }
  .share-preview .sp-art{width:100px;height:100px;margin:0 auto 16px;}
  .share-preview .sp-title{font-size:15px;letter-spacing:.2em;margin-bottom:6px;font-weight:600;}
  .share-preview .sp-sub{font-size:10px;letter-spacing:.3em;color:var(--ink-soft-2);margin-bottom:14px;}
  .share-preview .sp-quote{font-size:11px;color:var(--ink-soft);font-style:italic;line-height:1.8;padding:10px 14px;border-top:1px solid rgba(0,0,0,.08);border-bottom:1px solid rgba(0,0,0,.08);margin-bottom:10px;}
  .share-preview .sp-foot{font-size:9px;letter-spacing:.4em;color:var(--gold);}
  .share-row{display:flex;gap:8px;}
  .share-row .primary{flex:1;text-align:center;}

  /* shop tab */
  .shop-item{
    display:flex;gap:14px;padding:14px;
    border:1px solid rgba(0,0,0,.08);margin-bottom:10px;
    cursor:pointer;transition:all .3s;
  }
  .shop-item:hover{border-color:var(--gold);background:rgba(184,134,11,.04);}
  .shop-thumb{
    width:64px;height:64px;background:linear-gradient(135deg,#d9c79a,#a48148);
    flex-shrink:0;display:grid;place-items:center;color:#fff;font-size:18px;
    font-family:"Ma Shan Zheng",serif;
  }
  .shop-meta{flex:1;}
  .shop-name{font-size:13px;margin-bottom:4px;}
  .shop-desc{font-size:11px;color:var(--ink-soft-2);line-height:1.7;}
  .shop-price{font-size:12px;color:var(--gold);margin-top:6px;letter-spacing:.1em;}

  @media (max-width:760px){
    .detail-card{grid-template-columns:1fr;max-height:96vh;}
    .detail-stage{padding:20px;}
    .detail-meta{padding:24px 20px;}
    .shelf-grid{grid-template-columns:repeat(2, 1fr);grid-template-rows:repeat(3, 130px);}
    .niche.wide{grid-column:span 2;}
    .gallery-grid{grid-template-columns:1fr 1fr;gap:40px 20px;}
    .pedestal-art{width:100px;height:100px;}
    .pedestal-base{width:120px;height:44px;}
  }

  /* ============================================================
     MODERN THEME (当代) — dark ink, paper text, gold accents
  ============================================================ */
  body[data-theme="modern"]{
    color:#f2e7d0;
    background-color:#0e0c0a;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200,150,90,.10) 0, transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(168,58,42,.08) 0, transparent 60%),
      linear-gradient(180deg, #0e0c0a 0%, #0a0907 100%);
  }
  body[data-theme="modern"][data-skin="gallery"]{background-color:#0a0907;}
  body[data-theme="modern"] .topbar{border-bottom-color:rgba(200,150,90,.18);background:rgba(14,12,10,.85);}

  body[data-theme="modern"] .hall-tab:hover{color:#f2e7d0;}
  body[data-theme="modern"] .hall-tab.active{color:#f2e7d0;background:rgba(200,150,90,.08);border-bottom-color:#c8965a;}
  body[data-theme="modern"] .hall-banner .hb-title{color:#f2e7d0;}
  body[data-theme="modern"] .hall-banner .hb-story{color:#a09684;}
  body[data-theme="modern"] .niche{background:radial-gradient(ellipse at 50% 30%, #1a1208, #0a0604);}

  body[data-theme="modern"] .skin-drawer{background:#14110d;color:#f2e7d0;}
  body[data-theme="modern"] .skin-opt{border-color:rgba(200,150,90,.20);}
  body[data-theme="modern"] .skin-opt:hover{border-color:#c8965a;}
  body[data-theme="modern"] .skin-opt.active{background:rgba(200,150,90,.10);border-color:#c8965a;}

  /* theme toggle pill (museum) */
  .theme-toggle{
    display:inline-flex;align-items:center;
    border:1px solid rgba(0,0,0,.15);border-radius:999px;overflow:hidden;
    margin-right:8px;
  }
  body[data-theme="modern"] .theme-toggle{border-color:rgba(200,150,90,.25);}
  .theme-toggle button{
    padding:5px 11px;font-size:10px;letter-spacing:.3em;
    color:var(--ink-soft);background:transparent;cursor:pointer;
    font-family:inherit;border:none;transition:.25s;
  }
  body[data-theme="modern"] .theme-toggle button{color:#a09684;}
  .theme-toggle button.on{background:var(--red);color:var(--paper);font-weight:600;}
  body[data-theme="modern"] .theme-toggle button.on{background:#c8965a;color:#1a1208;}

  /* ============================================================
     FLOOR PLAN MAP (展厅分布)
  ============================================================ */
  #mapView{padding:36px 24px 80px;}
  .map-head{text-align:center;margin-bottom:28px;}
  .map-head .mh-tag{display:inline-flex;align-items:center;gap:14px;font-size:11px;letter-spacing:.5em;color:var(--red);margin-bottom:4px;}
  .map-head .mh-tag::before, .map-head .mh-tag::after{content:"回";font-family:"Ma Shan Zheng",serif;font-size:14px;color:var(--red);}
  .map-head h2{font-family:"Ma Shan Zheng",serif;font-size:30px;letter-spacing:.4em;color:var(--ink);margin-top:2px;}
  body[data-theme="modern"] .map-head h2{color:#f2e7d0;}
  body[data-theme="modern"] .map-head .mh-tag{color:#c8965a;}
  body[data-theme="modern"] .map-head .mh-tag::before, body[data-theme="modern"] .map-head .mh-tag::after{color:#c8965a;}

  .map-floor{
    max-width:760px;margin:0 auto;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(0,0,0,.08);
    padding:18px;
    box-shadow:0 6px 24px rgba(0,0,0,.06);
  }
  body[data-theme="modern"] .map-floor{background:rgba(255,255,255,.03);border-color:rgba(200,150,90,.18);}

  .map-grid{

  }

  .map-cell.locked{cursor:not-allowed;filter:grayscale(.4) brightness(.7);}

  .map-cell .mc-tag{font-family:"Ma Shan Zheng",serif;font-size:16px;letter-spacing:.2em;opacity:.85;}
  .map-cell .mc-name{font-family:"Ma Shan Zheng",serif;font-size:28px;letter-spacing:.3em;}
  .map-cell .mc-cat{font-size:10px;letter-spacing:.3em;opacity:.85;}
  .map-cell .mc-prog{
    position:absolute;bottom:8px;right:10px;

    padding:2px 8px;background:rgba(0,0,0,.30);border-radius:2px;

  .map-cell .mc-en{

  .hall-back{

  body[data-theme="modern"] .hall-back{border-color:rgba(200,150,90,.25);color:#a09684;}

    .map-cell .mc-name{font-size:22px;letter-spacing:.2em;}

  }
</style>

<body data-skin="shelf">

  <!-- top bar -->
  <header class="topbar">

function makeJadeSVG({size=120, withRepair=true, rotation=0}={}){
  // 半环形玉璜，五段拼合
  const segs = [[0,38],[38,78],[78,122],[122,158],[158,180]];
  const CX=300, CY=340, RO=180, RI=110;
  function pt(r,a){const rad=a*Math.PI/180;return [CX - r*Math.cos(rad), CY - r*Math.sin(rad)];}
  const paths = segs.map(([a1,a2],i) => {
    const [x1,y1]=pt(RO,a1),[x2,y2]=pt(RO,a2),[x3,y3]=pt(RI,a2),[x4,y4]=pt(RI,a1);
    const d=`M${x1} ${y1} A${RO} ${RO} 0 0 1 ${x2} ${y2} L${x3} ${y3} A${RI} ${RI} 0 0 0 ${x4} ${y4} Z`;
    const gap = withRepair ? 0 : (i%2===0 ? 12 : -8);
    return `<path d="${d}" fill="url(#jadeG${size})" stroke="#3a5a3a" stroke-width="${withRepair?0.6:1.2}" transform="translate(${gap} ${gap*0.4})"/>`;
  }).join("");
  return `<svg viewBox="0 0 600 600" width="${size}" height="${size}" style="transform:rotate(${rotation}deg)">
    <defs>
      <radialGradient id="jadeG${size}" cx="50%" cy="40%" r="70%">
        <stop offset="0%" stop-color="#cfe2c2"/>
        <stop offset="50%" stop-color="#88a878"/>
        <stop offset="100%" stop-color="#456a48"/>
      </radialGradient>
    </defs>
    <ellipse cx="300" cy="400" rx="220" ry="30" fill="rgba(0,0,0,.12)"/>
    ${paths}
    ${withRepair ? `<g opacity=".55" stroke="#3a5a3a" stroke-width=".4" fill="none">
      <path d="M180 300 q60 -40 120 -20 q60 -20 120 20"/>
      <circle cx="240" cy="290" r="2"/><circle cx="300" cy="280" r="2"/><circle cx="360" cy="290" r="2"/>
    </g>` : ""}
  </svg>`;
}

function makeCupSVG({size=120, withRepair=true, rotation=0}={}){
  const cx=300, cy=300;
  // crackle glaze (decorative hairlines)
  let crackle = "";
  for(let i=0;i<40;i++){
    const a = (i*97 + 31) % 360 * Math.PI/180; // deterministic
    const r = 30 + (i*53 % 180);
    const x = cx + Math.cos(a)*r, y = cy + Math.sin(a)*r;
    const a2 = a + ((i*7%10)/10 - .5)*1.5;
    const x2 = x + Math.cos(a2)*18, y2 = y + Math.sin(a2)*18;
    crackle += `<path d="M${x.toFixed(1)} ${y.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)}" stroke="rgba(60,80,70,.25)" stroke-width=".5" fill="none"/>`;
  }
  // damage cracks
  const cracks = [
    "M170,200 L210,225 L255,245 L300,255 L345,260 L388,272 L420,290",
    "M300,255 L315,295 L325,335 L330,375 L330,410",
    "M255,245 L235,215 L218,185 L205,158"
  ];
  let crackPaths = cracks.map(d=>
    `<path d="${d}" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".55"/>`
  ).join("");

  // staples (锔钉) at fixed positions if restored
  let staples = "";
  if(withRepair){
    const stapleSpots = [
      // each: [x, y, angleDeg]
      // crack 1 (6)
      [200,220, 30],[235,236,30],[270,247,15],[305,256,8],[340,260,5],[375,267,12],
      // crack 2 (5)
      [307,275,65],[315,308,70],[322,338,75],[326,365,80],[329,392,85],
      // crack 3 (4)
      [248,228,250],[238,205,250],[225,180,255],[213,160,255]
    ];
    staples = stapleSpots.map(([x,y,deg])=>{
      // staple: bar + 2 caps, drawn locally then transformed
      return `<g transform="translate(${x} ${y}) rotate(${deg})">
        <line x1="-9" y1="1" x2="9" y2="1" stroke="rgba(0,0,0,.35)" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="-9" y1="0" x2="9" y2="0" stroke="#3b2f24" stroke-width="2.6" stroke-linecap="round"/>
        <line x1="-9" y1="-.4" x2="9" y2="-.4" stroke="rgba(180,160,130,.7)" stroke-width=".8" stroke-linecap="round"/>
        <circle cx="-9" cy="1" r="4" fill="rgba(0,0,0,.4)"/>
        <circle cx="-9" cy="0" r="3.6" fill="#4a3a2a"/>
        <circle cx="-9.8" cy="-.8" r="1.2" fill="rgba(220,200,170,.85)"/>
        <circle cx="9" cy="1" r="4" fill="rgba(0,0,0,.4)"/>
        <circle cx="9" cy="0" r="3.6" fill="#4a3a2a"/>
        <circle cx="8.2" cy="-.8" r="1.2" fill="rgba(220,200,170,.85)"/>
      </g>`;
    }).join("");
  }
  return `<svg viewBox="0 0 600 600" width="${size}" height="${size}" style="display:block;transform:rotate(${rotation}deg);transition:transform .12s linear;">
    <defs>
      <radialGradient id="co-${size}" cx="50%" cy="42%" r="60%">
        <stop offset="0%" stop-color="#c3d4c8"/><stop offset="55%" stop-color="#a3bbb0"/><stop offset="100%" stop-color="#6f8c84"/>
      </radialGradient>
      <radialGradient id="ci-${size}" cx="50%" cy="50%" r="55%">
        <stop offset="0%" stop-color="#b8cdc1"/><stop offset="100%" stop-color="#7a978f"/>
      </radialGradient>
    </defs>
    <ellipse cx="${cx}" cy="${cy+10}" rx="230" ry="55" fill="rgba(0,0,0,.18)" filter="blur(6px)"/>
    <circle cx="${cx}" cy="${cy}" r="230" fill="#dbe2d8" stroke="#3a3a3a" stroke-width="1.2"/>
    <circle cx="${cx}" cy="${cy}" r="225" fill="url(#co-${size})"/>
    <circle cx="${cx}" cy="${cy}" r="215" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
    ${crackle}
    <circle cx="${cx}" cy="${cy}" r="88" fill="url(#ci-${size})" opacity=".95"/>
    <circle cx="${cx}" cy="${cy}" r="88" fill="none" stroke="rgba(60,80,70,.4)" stroke-width=".8"/>
    <circle cx="${cx}" cy="${cy}" r="22" fill="none" stroke="rgba(60,80,70,.5)" stroke-width=".7"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-family="Ma Shan Zheng,serif" font-size="16" fill="rgba(50,70,60,.6)">龍</text>
    ${crackPaths}
    ${staples}
  </svg>`;
}

function makeBowlSVG({size=120, withGold=true, rotation=0}={}){
  const cx=300, cy=300;
  let goldPath = "";
  if(withGold){
    // 5 simplified gold cracks radiating from an impact point
    const seeds = [
      "M270,250 L255,220 L240,200 L218,180 L195,160",
      "M270,250 L295,235 L325,225 L360,220 L400,215",
      "M270,250 L280,290 L295,330 L312,370 L325,410",
      "M270,250 L240,275 L210,300 L175,330 L140,360",
      "M270,250 L255,210 L235,175 L210,145 L185,120"
    ];
    goldPath = seeds.map(d=>`
      <path d="${d}" fill="none" stroke="#e6b450" stroke-width="6" stroke-linecap="round" opacity=".35"/>
      <path d="${d}" fill="none" stroke="#c9961f" stroke-width="3" stroke-linecap="round"/>
      <path d="${d}" fill="none" stroke="#fff2c2" stroke-width="1" stroke-linecap="round" opacity=".85"/>
    `).join("");
  }
  // petals
  let petals = "";
  for(let i=0;i<12;i++){
    const a = (i/12)*Math.PI*2;
    const r1=140,r2=170;
    const x1=cx+Math.cos(a)*r1, y1=cy+Math.sin(a)*r1;
    const x2=cx+Math.cos(a+0.18)*r2, y2=cy+Math.sin(a+0.18)*r2;
    const mx=cx+Math.cos(a+0.09)*(r1+r2)/2 + Math.cos(a+Math.PI/2)*10;
    const my=cy+Math.sin(a+0.09)*(r1+r2)/2 + Math.sin(a+Math.PI/2)*10;
    petals += `<path d="M${x1} ${y1} Q${mx} ${my} ${x2} ${y2}" fill="none" stroke="#2b4a7a" stroke-width="2.2" stroke-linecap="round" opacity=".78"/>`;
    petals += `<circle cx="${mx}" cy="${my}" r="3" fill="#2b4a7a" opacity=".65"/>`;
  }
  // lotus center
  let lotus = "";
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    const x=cx+Math.cos(a)*22, y=cy+Math.sin(a)*22;
    lotus += `<ellipse cx="${x}" cy="${y}" rx="18" ry="8" transform="rotate(${a*180/Math.PI} ${x} ${y})" fill="none" stroke="#2b4a7a" stroke-width="1.2" opacity=".55"/>`;
  }

  return `<svg viewBox="0 0 600 600" width="${size}" height="${size}" style="display:block;transform:rotate(${rotation}deg);transition:transform .12s linear;">
    <defs>
      <radialGradient id="bg-${size}" cx="50%" cy="42%" r="60%">
        <stop offset="0%" stop-color="#fbfaf5"/><stop offset="70%" stop-color="#eee6d3"/><stop offset="100%" stop-color="#d8cdb3"/>
      </radialGradient>
      <radialGradient id="wl-${size}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#e8ddc4"/><stop offset="100%" stop-color="#cdbf9e"/>
      </radialGradient>
    </defs>
    <ellipse cx="${cx}" cy="${cy+10}" rx="230" ry="55" fill="rgba(0,0,0,.18)" filter="blur(6px)"/>
    <circle cx="${cx}" cy="${cy}" r="230" fill="#f7f1e6" stroke="#3a3a3a" stroke-width="1.2"/>
    <circle cx="${cx}" cy="${cy}" r="225" fill="url(#bg-${size})"/>
    <circle cx="${cx}" cy="${cy}" r="180" fill="none" stroke="#2b4a7a" stroke-width="1.5" opacity=".7"/>
    <circle cx="${cx}" cy="${cy}" r="170" fill="none" stroke="#2b4a7a" stroke-width=".6" opacity=".5"/>
    ${petals}
    <circle cx="${cx}" cy="${cy}" r="90" fill="url(#wl-${size})" stroke="#2b4a7a" stroke-width=".8" opacity=".6"/>
    ${lotus}
    <circle cx="${cx}" cy="${cy}" r="6" fill="#2b4a7a" opacity=".7"/>
    ${goldPath}
  </svg>`;
}

============================================================ */
const stage = document.getElementById("stage");

function renderSkin(){
  document.body.dataset.skin = currentSkin;
  if(currentSkin==="shelf")   renderShelf();
  if(currentSkin==="gallery") renderGallery();
  if(currentSkin==="scroll")  renderScrollLocked();
}

function renderHallTabs(){
  const tabs = document.getElementById("hallTabs");
  tabs.innerHTML = HALLS.map(h=>{
    const items = ITEMS.filter(i=>i.chapter===h.n);
    const done = items.filter(i=>i.restored).length;
    const total = items.length;
    const unlocked = hallUnlocked(h.n);
    const active = (h.n===currentHall) ? "active" : "";
    const lock = unlocked ? "" : "locked";
    return `<button class="hall-tab ${active} ${lock}" data-hall="${h.n}" role="tab" style="--c:${h.color};">
      <div class="ht-n" style="color:${h.color};">卷 ${"一二三四五"[h.n-1]}</div>
      <div class="ht-name">${h.name}</div>
      <div class="ht-cnt">${done} / ${total}</div>
    </button>`;
  }).join("");
  tabs.querySelectorAll(".hall-tab").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const n = +btn.dataset.hall;
      if(!hallUnlocked(n)){
        // gentle hint
        alert("先完成卷 " + "一二三四五"[n-2] + " 全部修复，方可启「" + HALLS[n-1].name.replace(/\s/g,"") + "」展厅。");
        return;
      }
      currentHall = n;
      renderHallTabs();
      renderHallBanner();
      renderSkin();
    });
  });
}

function renderHallBanner(){
  const h = HALLS[currentHall-1];
  document.getElementById("hallBanner").innerHTML = `
    <div class="hb-cat">${h.cat}</div>
    <div class="hb-title" style="color:${h.color};">卷 ${"一二三四五"[h.n-1]} · ${h.name}</div>
    <div class="hb-story">${h.story}</div>
  `;
}

function renderShelf(){
  const items = ITEMS.filter(i=>i.chapter===currentHall);
  let html = `<div class="shelf"><div class="shelf-grid">`;
  items.forEach(item=>{
    const empty = !item.restored ? "empty" : "";
    const inner = item.restored
      ? makeArtSVG(item, {size:90})
      : `<div class="silhouette">?</div>`;
    html += `<div class="niche ${empty}" data-id="${item.id}">
      <div class="niche-light"></div>
      ${inner}
      <div class="niche-name">${item.restored ? item.name.replace(/·/g,"·").slice(0,8) : "尚 · 待 · 寻"}</div>
    </div>`;
  });
  html += `</div></div>`;
  stage.innerHTML = html;
  wireNiches();
}

function renderGallery(){
  const h = HALLS[currentHall-1];
  const items = ITEMS.filter(i=>i.chapter===currentHall);
  let html = `<div class="gallery">
    <div style="text-align:center;font-size:11px;letter-spacing:.5em;color:var(--ink-soft-2);">
      HALL ${currentHall} · ${h.name.replace(/\s/g,"")} · 主厅
    </div>
    <div class="gallery-grid">`;
  items.forEach(item=>{
    const empty = !item.restored ? "empty" : "";
    const inner = item.restored
      ? makeArtSVG(item, {size:120})
      : `<div class="silhouette">?</div>`;
    html += `<div class="pedestal ${empty}" data-id="${item.id}">
      <div class="pedestal-spot"></div>
      <div class="pedestal-art">${inner}</div>
      <div class="pedestal-base"></div>

  });
  html += `</div></div>`;
  stage.innerHTML = html;
  wireNiches();
}

function wireNiches(){
  document.querySelectorAll("[data-id]").forEach(n=>{
    n.addEventListener("click", ()=>{
      const item = ITEMS.find(x=>x.id===n.dataset.id);
      if(item.restored) openDetail(item);
      else openLocked(item);
    });
  });
}

============================================================ */
const skinDrawer = document.getElementById("skinDrawer");
const skinList = document.getElementById("skinList");

function renderSkinList(){
  const haveLamps = (window.Ad ? Ad.getLamps() : 0);
  skinList.innerHTML = `
    <div style="font-size:11px;letter-spacing:.2em;color:var(--ink-soft-2);padding:8px 0 14px;text-align:right;">
      灯油 · <span style="color:var(--gold);font-weight:600;">${haveLamps} 盏</span>
    </div>
  ` + SKINS.map(s=>`
    <div class="skin-opt ${s.id===currentSkin?'active':''} ${!s.unlocked?'locked':''}" data-skin="${s.id}">
      <div class="swatch"></div>
      <div class="skin-opt-meta">
        <div class="skin-opt-name">${s.name}</div>
        <div class="skin-opt-desc">${s.desc}</div>
      </div>
      ${s.unlocked
        ? (s.id===currentSkin?`<div class="lock">✓</div>`:``)
        : `<div class="lock">供 ${s.needLamps} 盏</div>`}
    </div>
  `).join("");
  skinList.querySelectorAll(".skin-opt").forEach(el=>{
    el.addEventListener("click", ()=>{
      const sid = el.dataset.skin;
      const s = SKINS.find(x=>x.id===sid);
      if(!s.unlocked){
        if(window.Ad){
          Ad.openSkin({
            skinName: s.name,
            needLamps: s.needLamps,
            onUnlock: ()=>{
              try{ localStorage.setItem("skin.unlocked."+s.id, "1"); }catch(e){}
              s.unlocked = true;
              currentSkin = s.id;
              renderSkin();
              renderSkinList();
              skinDrawer.hidden = true;
            }
          });
        }
        return;
      }
      currentSkin = sid;
      renderSkin();
      renderSkinList();
      skinDrawer.hidden = true;
    });
  });
}

document.getElementById("skinBtn").addEventListener("click", ()=>{

function openDetail(item){
  currentItem = item;

  document.getElementById("metaSub").textContent = `以「${item.technique}」技法修复 · ${item.date}`;

function openLocked(item){
  if(item.id === "longquan-cup"){
    window.location.href = "level2.html";
    return;
  }
  if(item.id === "bronze-jue"){
    window.location.href = "level3.html";
    return;
  }
  if(item.id === "yu-huang"){
    window.location.href = "level4.html";
    return;
  }
  if(item.id === "sancai-horse"){
    window.location.href = "level5.html";
    return;
  }
  alert(`「${item.name}」尚未开启。\n（在正式版中，这里会是一段诱人的预告：背景故事 + 损伤照片 + 「即将开放」倒计时）`);
}

function renderDetailArt(withRepair){
  if(currentItem.palette === "celadon"){
    detailCanvas.innerHTML = makeCupSVG({size:380, withRepair, rotation});
  } else if(currentItem.palette === "bronze"){
    detailCanvas.innerHTML = makeBronzeSVG({size:380, withRepair, rotation});
  } else if(currentItem.palette === "jade"){
    detailCanvas.innerHTML = makeJadeSVG({size:380, withRepair, rotation});
  } else if(currentItem.palette === "sancai"){
    detailCanvas.innerHTML = makeHorseSVG({size:380, withRepair, rotation});

/* —— rotation drag —— */
let dragging=false, dragLast=0;
detailCanvas.addEventListener("mousedown", e=>{ dragging=true; dragLast=e.clientX; });
detailCanvas.addEventListener("touchstart", e=>{ dragging=true; dragLast=e.touches[0].clientX; }, {passive:true});
window.addEventListener("mousemove", e=>{
  if(!dragging) return;
  rotation += (e.clientX - dragLast)*0.5;
  dragLast = e.clientX;
  const svg = detailCanvas.querySelector("svg");
  if(svg) svg.style.transform = `rotate(${rotation}deg)`;
});
window.addEventListener("touchmove", e=>{
  if(!dragging) return;
  rotation += (e.touches[0].clientX - dragLast)*0.5;
  dragLast = e.touches[0].clientX;
  const svg = detailCanvas.querySelector("svg");
  if(svg) svg.style.transform = `rotate(${rotation}deg)`;
}, {passive:true});
window.addEventListener("mouseup", ()=>dragging=false);
window.addEventListener("touchend", ()=>dragging=false);

/* —— Replay: rebuild gold step-by-step —— */
document.getElementById("replayBtn").addEventListener("click", ()=>{
  if(replayTimer) clearTimeout(replayTimer);
  renderDetailArt(false);
  const svg = detailCanvas.querySelector("svg");
  if(!svg) return;
  const ns = "http://www.w3.org/2000/svg";

  if(currentItem.palette === "bronze"){
    const ins = document.createElementNS(ns,"g");
    ins.setAttribute("transform","translate(300 320)");
    ins.setAttribute("font-family","Ma Shan Zheng, serif");
    ins.setAttribute("text-anchor","middle");
    ins.setAttribute("fill","#2b1d0a");
    ins.style.opacity = 0;
    ins.innerHTML = `<text y="-2" font-size="22" letter-spacing="6">司母</text><text y="22" font-size="22" letter-spacing="6">辛尊</text>`;
    svg.appendChild(ins);
    const patches = [];
    const spots = [[240,295,35],[350,330,30],[280,340,22],[330,290,20]];
    spots.forEach(([x,y,r])=>{
      const c = document.createElementNS(ns,"circle");
      c.setAttribute("cx",x); c.setAttribute("cy",y); c.setAttribute("r",r);
      c.setAttribute("fill","#6a8a4a"); c.setAttribute("opacity",".75");
      svg.appendChild(c); patches.push(c);
    });
    let bi=0;
    function bstep(){
      if(bi>=patches.length){
        ins.style.transition="opacity .8s ease"; ins.style.opacity=1;
        return;
      }
      const c = patches[bi++];
      c.style.transition = "opacity .5s ease";
      c.style.opacity = 0;
      replayTimer = setTimeout(bstep, 500);
    }
    bstep();
    return;
  }

  if(currentItem.palette === "jade"){
    // 五段玉璜从错位归位
    const segs = svg.querySelectorAll("path");
    segs.forEach((s, i) => {
      s.style.transition = "transform 1.2s ease";
      setTimeout(() => { s.style.transform = "translate(0,0)"; }, 300 + i*250);
    });
    return;
  }
  if(currentItem.palette === "sancai"){
    // 灰色损伤逐个褪去
    renderDetailArt(false);
    const svg2 = detailCanvas.querySelector("svg");
    const dmg = svg2.querySelectorAll("g[opacity='.88'] ellipse");
    let di = 0;
    function fstep(){
      if(di >= dmg.length){ renderDetailArt(true); return; }
      const e = dmg[di++];
      e.style.transition = "opacity 1s ease";
      e.style.opacity = 0;
      replayTimer = setTimeout(fstep, 700);
    }
    fstep();
    return;
  }

  if(currentItem.palette === "celadon"){
    const stapleSpots = [
      [200,220,30],[235,236,30],[270,247,15],[305,256,8],[340,260,5],[375,267,12],
      [307,275,65],[315,308,70],[322,338,75],[326,365,80],[329,392,85],
      [248,228,250],[238,205,250],[225,180,255],[213,160,255]
    ];
    let i = 0;
    function step(){
      if(i>=stapleSpots.length) return;
      const [x,y,deg] = stapleSpots[i++];
      const g = document.createElementNS(ns,"g");
      g.setAttribute("transform", `translate(${x} ${y}) rotate(${deg})`);
      g.innerHTML = `
        <line x1="-9" y1="1" x2="9" y2="1" stroke="rgba(0,0,0,.35)" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="-9" y1="0" x2="9" y2="0" stroke="#3b2f24" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="-9" cy="0" r="3.6" fill="#4a3a2a"/>
        <circle cx="9" cy="0" r="3.6" fill="#4a3a2a"/>`;
      g.style.opacity = 0;
      g.style.transformBox = "fill-box";
      svg.appendChild(g);
      requestAnimationFrame(()=>{ g.style.transition="opacity .25s ease"; g.style.opacity = 1; });
      replayTimer = setTimeout(step, 220);
    }
    step();
    return;
  }

  // gold-line replay (original)
  const seeds = [
    "M270,250 L255,220 L240,200 L218,180 L195,160",
    "M270,250 L295,235 L325,225 L360,220 L400,215",
    "M270,250 L280,290 L295,330 L312,370 L325,410",
    "M270,250 L240,275 L210,300 L175,330 L140,360",
    "M270,250 L255,210 L235,175 L210,145 L185,120"
  ];
  let i=0;
  function stepGold(){
    if(i>=seeds.length){ renderDetailArt(true); return; }
    [{c:"#e6b450",w:6,o:.35},{c:"#c9961f",w:3,o:1},{c:"#fff2c2",w:1,o:.85}].forEach(L=>{
      const p = document.createElementNS(ns,"path");
      p.setAttribute("d", seeds[i]);
      p.setAttribute("fill","none"); p.setAttribute("stroke",L.c);
      p.setAttribute("stroke-width",L.w); p.setAttribute("stroke-linecap","round");
      p.setAttribute("opacity", L.o);
      const len = 600;
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.transition = "stroke-dashoffset 1s ease";
      svg.appendChild(p);
      requestAnimationFrame(()=>{ p.style.strokeDashoffset = 0; });
    });
    i++;
    replayTimer = setTimeout(stepGold, 700);
  }
  stepGold();
});

(function pickInitialHall(){
  for(const h of HALLS){
    if(!hallUnlocked(h.n)) break;
    const items = ITEMS.filter(i=>i.chapter===h.n);
    if(items.some(i=>!i.restored)){ currentHall = h.n; return; }

// theme toggle
(function initTheme(){
  function safeGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
  function apply(t){
    document.body.dataset.theme = t;
    document.querySelectorAll('[data-theme-set]').forEach(b=>{
      b.classList.toggle('on', b.dataset.themeSet === t);
    });
    try{ localStorage.setItem('uiTheme', t); }catch(_){}
  }
  const saved = safeGet('uiTheme') || 'vintage';
  apply(saved);
  document.querySelectorAll('[data-theme-set]').forEach(b=>{
    b.addEventListener('click', ()=> apply(b.dataset.themeSet));
  });
})();

/* ====== Floor-plan map ====== */
// Layout order in 3x2 grid:
// (1,1) 卷一 格物    (1,2) 中庭        (1,3) 卷三 载文
// (2,1) 卷二 乘木    (2,2) 中庭        (2,3) 卷四 经纬
// 卷五 placed as a wide bottom strip via inline grid-column
const MAP_LAYOUT = [
  { hall:1, gridArea:"1 / 1" },
  { lobby:true, gridArea:"1 / 2 / 3 / 3" },
  { hall:3, gridArea:"1 / 3" },
  { hall:2, gridArea:"2 / 1" },
  { hall:4, gridArea:"2 / 3" }
];

function renderMap(){
  const grid = document.getElementById("mapGrid");
  // adjust grid template to 3x2 + a wider 5th hall as full-width footer row
  grid.style.gridTemplateColumns = "1.2fr 1fr 1.2fr";
  grid.style.gridTemplateRows = "150px 150px 110px";
  let html = "";
  MAP_LAYOUT.forEach(c=>{
    if(c.lobby){
      html += `<div class="map-cell lobby" style="grid-area:${c.gridArea};">
        <div class="lobby-icon">⊟</div>
        <div class="lobby-text">中 庭</div>
        <div style="font-size:9px;letter-spacing:.25em;opacity:.6;margin-top:2px;">Lobby</div>
      </div>`;
    } else {
      const h = HALLS[c.hall-1];
      const items = ITEMS.filter(i=>i.chapter===h.n);
      const done = items.filter(i=>i.restored).length;
      const total = items.length;
      const unlocked = hallUnlocked(h.n);
      html += `<div class="map-cell ${unlocked?'':'locked'}" data-hall="${h.n}"
                style="grid-area:${c.gridArea};background:${h.color};">
        <div class="mc-en">HALL ${h.n}</div>
        <div class="mc-tag">卷 ${"一二三四五"[h.n-1]}</div>
        <div class="mc-name">${h.name}</div>
        <div class="mc-cat">${h.cat}</div>
        <div class="mc-prog">${done} / ${total}</div>
      </div>`;
    }
  });
  // 卷五 as bottom wide row
  const h5 = HALLS[4];
  const items5 = ITEMS.filter(i=>i.chapter===5);
  const done5 = items5.filter(i=>i.restored).length;
  const u5 = hallUnlocked(5);
  html += `<div class="map-cell ${u5?'':'locked'}" data-hall="5"
            style="grid-area:3 / 1 / 4 / 4;background:${h5.color};min-height:110px;">
    <div class="mc-en">HALL 5</div>
    <div class="mc-tag">卷 五</div>
    <div class="mc-name" style="font-size:24px;">${h5.name}</div>
    <div class="mc-cat">${h5.cat}</div>
    <div class="mc-prog">${done5} / ${items5.length}</div>
  </div>`;
  grid.innerHTML = html;
  grid.querySelectorAll(".map-cell[data-hall]").forEach(cell=>{
    cell.addEventListener("click", ()=>{
      const n = +cell.dataset.hall;
      if(!hallUnlocked(n)){
        alert("先完成卷 " + "一二三四五"[n-2] + " 全部修复，方可启「" + HALLS[n-1].name.replace(/\s/g,"") + "」展厅。");
        return;
      }
      enterHall(n);
    });
  });
}

function enterHall(n){
  currentHall = n;
  document.body.classList.remove("on-map");
  document.body.classList.add("on-hall");
  document.getElementById("mapView").hidden = true;
  document.getElementById("hallView").hidden = false;
  document.getElementById("topTitle").textContent = "卷 " + "一二三四五"[n-1] + " · " + HALLS[n-1].name;
  renderHallTabs();
  renderHallBanner();
  renderSkin();
  window.scrollTo({top:0, behavior:"smooth"});
}
function exitHall(){
  document.body.classList.add("on-map");
  document.body.classList.remove("on-hall");
  document.getElementById("mapView").hidden = false;
  document.getElementById("hallView").hidden = true;
  document.getElementById("topTitle").textContent = "";
  renderMap();
  window.scrollTo({top:0, behavior:"smooth"});
}
document.getElementById("hallBackBtn").addEventListener("click", exitHall);

document.body.classList.add("on-map");
document.getElementById("topTitle").textContent = "";
renderMap();
</script>
