<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>修 · 鉴定小考</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script>/*AD_INLINED*/
/* ================================================================
   修 · 广告位 + 打赏组件
   - Ad.openLamp({...})    关卡完成「添灯」
   - Ad.openSkin({...})    博物馆皮肤「供奉」
   - Ad.openRevive({...})  小考「翻签」
   - Ad.openRubbing({...}) 通关「拓片礼」
   - Ad.getLamps() / Ad.spendLamps(n)  灯油会计
   状态: localStorage.lamps (int) / localStorage.adseen.{key} (1)
=================================================================*/
(function(){
  if(window.Ad) return;

  /* ---------- styles ---------- */
  const css = `
  .ad-mask{position:fixed;inset:0;background:rgba(8,6,4,.78);backdrop-filter:blur(6px);
    z-index:9000;display:flex;align-items:center;justify-content:center;
    animation:adFade .4s ease;font-family:"Noto Serif SC",serif;}
  .ad-card{width:min(440px,90vw);background:linear-gradient(180deg,#1a1612,#0e0a08);
    border:1px solid rgba(200,150,90,.3);padding:32px 28px;color:#f2e7d0;
    box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;}
  .ad-close{position:absolute;top:10px;right:14px;width:24px;height:24px;
    background:none;border:none;color:rgba(242,231,208,.4);cursor:pointer;font-size:18px;}
  .ad-close:hover{color:#c8965a;}
  .ad-lantern{width:60px;height:78px;margin:0 auto 14px;position:relative;
    animation:adRise 2.2s ease-in-out infinite alternate;}
  .ad-lantern::before{content:"";position:absolute;inset:8px 6px 12px 6px;
    background:radial-gradient(ellipse at center,#ffd98a 0%,#c87a2a 70%,#7a3a18 100%);
    border-radius:50% / 60%;box-shadow:0 0 30px rgba(255,180,80,.5),inset 0 0 12px rgba(80,30,10,.4);}
  .ad-lantern::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:30px;height:6px;background:#3a2618;border-radius:2px;}
  .ad-title{text-align:center;font-size:18px;letter-spacing:.3em;color:#c8965a;margin-bottom:10px;}
  .ad-sub{text-align:center;font-size:12px;letter-spacing:.15em;color:rgba(242,231,208,.6);margin-bottom:18px;line-height:1.8;}
  .ad-reward{margin:18px 0;padding:12px 14px;background:rgba(200,150,90,.06);
    border-left:2px solid #c8965a;font-size:12px;letter-spacing:.1em;color:#e6c898;}
  .ad-actions{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
  .ad-btn{padding:13px;font-size:12px;letter-spacing:.4em;cursor:pointer;
    transition:all .3s ease;font-family:inherit;border:none;}
  .ad-btn-primary{background:#a83a2a;color:#f2e7d0;}
  .ad-btn-primary:hover{background:#c44a3a;transform:translateY(-1px);}
  .ad-btn-ghost{background:transparent;color:#c8965a;border:1px solid rgba(200,150,90,.4);}
  .ad-btn-ghost:hover{background:rgba(200,150,90,.1);}
  .ad-btn-skip{background:transparent;color:rgba(242,231,208,.4);font-size:11px;letter-spacing:.3em;}
  .ad-btn-skip:hover{color:rgba(242,231,208,.7);}
  .ad-foot{margin-top:14px;text-align:center;font-size:10px;letter-spacing:.3em;color:rgba(242,231,208,.3);}
  .ad-lamps{display:inline-block;margin-left:8px;color:#c8965a;}

  /* ====== 广告播放阶段 ====== */
  .ad-play{padding:40px 28px;text-align:center;}
  .ad-play .smoke{width:80px;height:80px;margin:0 auto 18px;position:relative;}
  .ad-play .smoke::before,.ad-play .smoke::after{content:"";position:absolute;left:50%;bottom:0;
    width:14px;height:14px;background:rgba(200,150,90,.3);border-radius:50%;
    animation:adSmoke 2.4s linear infinite;}
  .ad-play .smoke::after{animation-delay:1.2s;}
  .ad-play .incense{position:absolute;left:calc(50% - 1px);bottom:0;width:2px;height:60px;
    background:linear-gradient(180deg,#c87a2a,#3a2618);}
  .ad-play .glow{position:absolute;left:calc(50% - 4px);top:14px;width:8px;height:8px;
    background:#ffaa55;border-radius:50%;box-shadow:0 0 16px #ff8833;}
  .ad-play h3{font-size:15px;letter-spacing:.3em;color:#c8965a;margin-bottom:10px;}
  .ad-play .sponsor{font-size:11px;letter-spacing:.25em;color:rgba(242,231,208,.45);margin-bottom:22px;}
  .ad-bar{width:100%;height:3px;background:rgba(242,231,208,.1);overflow:hidden;margin-bottom:8px;}
  .ad-bar span{display:block;height:100%;background:linear-gradient(90deg,#c87a2a,#ffd98a);width:0;}
  .ad-time{font-size:11px;letter-spacing:.2em;color:rgba(242,231,208,.5);}
  .ad-skip-late{margin-top:18px;font-size:10px;letter-spacing:.3em;color:rgba(242,231,208,.3);}

  /* ====== 打赏 ====== */
  .tea-card{text-align:center;padding:30px 24px;}
  .tea-card h3{font-size:16px;letter-spacing:.3em;color:#c8965a;margin-bottom:6px;}
  .tea-card .tea-sub{font-size:11px;letter-spacing:.25em;color:rgba(242,231,208,.5);margin-bottom:20px;}
  .tea-amts{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
  .tea-amts button{flex:1;padding:14px 0;font-size:13px;letter-spacing:.2em;
    border:1px solid rgba(200,150,90,.4);background:transparent;color:#c8965a;cursor:pointer;transition:.3s;}
  .tea-amts button:hover{background:rgba(200,150,90,.1);}
  .tea-qr{width:160px;height:160px;margin:0 auto 12px;background:#f2e7d0;
    display:flex;align-items:center;justify-content:center;font-size:11px;color:#3a2618;letter-spacing:.2em;text-align:center;line-height:1.6;}
  .tea-tip{font-size:11px;letter-spacing:.2em;color:rgba(242,231,208,.45);}

  @keyframes adFade{from{opacity:0}to{opacity:1}}
  @keyframes adRise{from{transform:translateY(2px)}to{transform:translateY(-4px)}}
  @keyframes adSmoke{
    0%{transform:translate(-50%,0) scale(.6);opacity:.7}
    100%{transform:translate(-50%,-80px) scale(2);opacity:0}
  }
  `;
  const s = document.createElement("style");
  s.textContent = css;
  document.head.appendChild(s);

  /* ---------- state ---------- */
  function readInt(k){ try{ return parseInt(localStorage.getItem(k))||0; }catch(e){ return 0; } }
  function writeInt(k,v){ try{ localStorage.setItem(k,String(v)); }catch(e){} }

  function makeMask(){
    const m = document.createElement("div");
    m.className = "ad-mask";
    document.body.appendChild(m);
    return m;
  }
  function close(mask){ if(mask && mask.parentNode) mask.parentNode.removeChild(mask); }

  /* ---------- 15s ad playback ---------- */
  function playAd(mask, opts){
    const dur = opts.duration || 15;
    const card = mask.querySelector(".ad-card");
    card.innerHTML = `
      <div class="ad-play">
        <div class="smoke">
          <div class="incense"></div><div class="glow"></div>
        </div>
        <h3>致 谢 方 · 一 炷 香</h3>
        <div class="sponsor">${opts.sponsor || "本期由「中国国家博物馆 · 文创」轻致谢"}</div>
        <div class="ad-bar"><span id="adBar"></span></div>
        <div class="ad-time"><span id="adTime">${dur}</span> s</div>
        <div class="ad-skip-late" id="adSkipLate" hidden>5 秒后可跳过</div>
      </div>
    `;
    const bar = card.querySelector("#adBar");
    const time = card.querySelector("#adTime");
    const skipEl = card.querySelector("#adSkipLate");
    let start = performance.now();
    let cancelled = false;
    let skippable = false;
    setTimeout(()=>{ skippable = true; skipEl.hidden = false; skipEl.textContent = "提 前 跳 过"; skipEl.style.cursor="pointer"; skipEl.onclick=()=>{ if(skippable){ finish(true); } }; }, Math.min(10000, dur*1000*0.7));
    function tick(){
      if(cancelled) return;
      const t = (performance.now() - start) / 1000;
      const p = Math.min(1, t/dur);
      bar.style.width = (p*100)+"%";
      time.textContent = Math.max(0, Math.ceil(dur - t));
      if(p >= 1){ finish(false); return; }
      requestAnimationFrame(tick);
    }
    function finish(early){
      cancelled = true;
      close(mask);
      // 给奖励
      if(opts.onComplete) opts.onComplete(early);
    }
    tick();
  }

  /* ---------- tea jar ---------- */
  function showTea(){
    const mask = makeMask();
    const card = document.createElement("div");
    card.className = "ad-card";
    card.innerHTML = `
      <button class="ad-close">×</button>
      <div class="tea-card">
        <h3>请 创 作 者 一 杯 茶</h3>
        <div class="tea-sub">你的心意会让这件治愈小作品走得更远</div>
        <div class="tea-amts">
          <button data-a="1">¥ 1</button>
          <button data-a="3">¥ 3</button>
          <button data-a="6">¥ 6</button>
        </div>
        <div class="tea-qr">微信赞赏码<br/>（正式版显示）</div>
        <div class="tea-tip">长按识别 · 或截图保存</div>
      </div>
    `;
    mask.appendChild(card);
    card.querySelector(".ad-close").onclick = ()=>close(mask);
    mask.onclick = e=>{ if(e.target === mask) close(mask); };
    card.querySelectorAll(".tea-amts button").forEach(b=>{
      b.onclick = ()=>{
        const a = b.dataset.a;
        card.querySelector(".tea-qr").innerHTML = `请扫码支付 ¥${a}<br/><span style="font-size:9px;color:#7a4a2a;">（演示二维码）</span>`;
      };
    });
  }

  /* ================ API ================ */
  const Ad = {
    getLamps(){ return readInt("lamps"); },
    addLamps(n){ writeInt("lamps", readInt("lamps")+n); },
    spendLamps(n){
      const cur = readInt("lamps");
      if(cur < n) return false;
      writeInt("lamps", cur - n);
      return true;
    },

    /* ---------- P0 关卡完成「添灯」 ---------- */
    openLamp(opts){
      // opts: { artifact, lampKey, onReward, onSkip, allowTea=true }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      const lamps = this.getLamps();
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">添 一 盏 灯</div>
        <div class="ad-sub">
          为这件 ${opts.artifact||"文物"} 添一盏灯，<br/>
          唤回它更多的记忆 ——
        </div>
        <div class="ad-reward">
          · 解 锁 完 整 图 鉴（高清出土照 · 修复师手记）<br/>
          · 获 得 一 盏 灯 油（可供奉博物馆皮肤）
        </div>
        <div class="ad-actions">
          <button class="ad-btn ad-btn-primary" id="adGo">添 灯（约 15 秒）</button>
          ${opts.allowTea === false ? "" : `<button class="ad-btn ad-btn-ghost" id="adTea">请 作 者 一 杯 茶</button>`}
          <button class="ad-btn ad-btn-skip" id="adSkip">素 心 而 过</button>
        </div>
        <div class="ad-foot">
          已添灯 <span class="ad-lamps">${lamps} 盏</span>
          · 今日添灯人次 ${(7000 + Math.floor(Math.random()*999)).toLocaleString()}
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#adSkip").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#adGo").onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「中国国家博物馆 · 文创」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            if(opts.lampKey){ try{ localStorage.setItem("adseen."+opts.lampKey, "1"); }catch(e){} }
            if(opts.onReward) opts.onReward();
          }
        });
      };
      const teaBtn = card.querySelector("#adTea");
      if(teaBtn) teaBtn.onclick = showTea;
    },

    /* ---------- P1 博物馆皮肤「供奉」 ---------- */
    openSkin(opts){
      // opts: { skinName, needLamps, onUnlock, onCancel }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      const have = this.getLamps();
      const need = opts.needLamps || 3;
      const enough = have >= need;
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">供 奉 · ${opts.skinName||"限定皮肤"}</div>
        <div class="ad-sub">
          此皮肤需供奉 <span style="color:#c8965a">${need}</span> 盏灯油<br/>
          你现有 <span style="color:#c8965a">${have}</span> 盏
        </div>
        <div class="ad-reward" style="text-align:center;">
          ${enough
            ? `灯油已足 · 一键供奉即可点亮`
            : `还差 ${need-have} 盏 · 可即时添灯补足`}
        </div>
        <div class="ad-actions">
          ${enough
            ? `<button class="ad-btn ad-btn-primary" id="skinGo">供 奉 · 点 亮 皮 肤</button>`
            : `<button class="ad-btn ad-btn-primary" id="skinAdd">添 一 盏 灯（约 15 秒）</button>`}
          <button class="ad-btn ad-btn-ghost" id="skinTea">请 作 者 一 杯 茶</button>
          <button class="ad-btn ad-btn-skip" id="skinSkip">改 日 再 来</button>
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onCancel) opts.onCancel(); };
      card.querySelector("#skinSkip").onclick = ()=>{ close(mask); if(opts.onCancel) opts.onCancel(); };
      card.querySelector("#skinTea").onclick = showTea;
      const go = card.querySelector("#skinGo");
      if(go) go.onclick = ()=>{
        Ad.spendLamps(need);
        close(mask);
        if(opts.onUnlock) opts.onUnlock();
      };
      const add = card.querySelector("#skinAdd");
      if(add) add.onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「故宫文创」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            // 重新打开（更新进度）
            setTimeout(()=>Ad.openSkin(opts), 200);
          }
        });
      };
    },

    /* ---------- P2 小考「翻签」 ---------- */
    openRevive(opts){
      // opts: { onRevive, onGiveUp }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">这 一 签 · 未 中</div>
        <div class="ad-sub">
          要不要翻一支救签？<br/>
          翻签可多得一次答题机会
        </div>
        <div class="ad-actions">
          <button class="ad-btn ad-btn-primary" id="revGo">翻 签（约 15 秒）</button>
          <button class="ad-btn ad-btn-skip" id="revSkip">认 命 · 重 开</button>
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onGiveUp) opts.onGiveUp(); };
      card.querySelector("#revSkip").onclick = ()=>{ close(mask); if(opts.onGiveUp) opts.onGiveUp(); };
      card.querySelector("#revGo").onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「上海博物馆 · 数字展」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            if(opts.onRevive) opts.onRevive();
          }
        });
      };
    },

    /* ---------- P3 通关「拓片礼」 ---------- */
    openRubbing(opts){
      // opts: { chapter, onGenerate, onSkip }
      const mask = makeMask();
      const card = document.createElement("div");
      card.className = "ad-card";
      card.innerHTML = `
        <button class="ad-close">×</button>
        <div class="ad-lantern"></div>
        <div class="ad-title">拓 片 留 念</div>
        <div class="ad-sub">
          为「${opts.chapter||"卷一·格物"}」通关<br/>
          制作一张你的修复拓片，可分享朋友圈
        </div>
        <div class="ad-reward">
          · 高 清 PNG · 含你修复过的全部文物<br/>
          · 可下载、可一键分享
        </div>
        <div class="ad-actions">
          <button class="ad-btn ad-btn-primary" id="rubGo">制 作 拓 片（约 15 秒）</button>
          <button class="ad-btn ad-btn-ghost" id="rubTea">请 作 者 一 杯 茶</button>
          <button class="ad-btn ad-btn-skip" id="rubSkip">下 次 再 说</button>
        </div>
      `;
      mask.appendChild(card);
      card.querySelector(".ad-close").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#rubSkip").onclick = ()=>{ close(mask); if(opts.onSkip) opts.onSkip(); };
      card.querySelector("#rubTea").onclick = showTea;
      card.querySelector("#rubGo").onclick = ()=>{
        playAd(mask, {
          duration: 15,
          sponsor: "本期由「陕西历史博物馆」轻致谢",
          onComplete: ()=>{
            Ad.addLamps(1);
            if(opts.onGenerate) opts.onGenerate();
          }
        });
      };
    },

    showTea: showTea
  };

  window.Ad = Ad;
})();

</script>
<style>
  :root{
    --paper:#eee9dc;
    --ink:#1a1a1a;
    --ink-soft:#3b3531;
    --gold:#d4af37;
    --gold-dark:#a3812a;
    --red:#9b2c2c;
    --green:#5a7a5a;
    --line:rgba(0,0,0,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;font-family:"Noto Serif SC",serif;color:var(--ink);background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(120,100,60,.06) 0, transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(90,70,30,.05) 0, transparent 60%),
      repeating-linear-gradient(45deg, rgba(0,0,0,.012) 0 1px, transparent 1px 6px);
  }
  button,a{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;text-decoration:none;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--line);}
  .topbar .back{font-size:12px;letter-spacing:.2em;color:var(--ink-soft);}
  .topbar .back:hover{color:var(--ink);}
  .topbar .title{font-size:14px;letter-spacing:.5em;color:var(--ink);font-weight:600;}
  .topbar .meta{font-size:11px;letter-spacing:.3em;color:var(--ink-soft);}

  main{max-width:640px;margin:0 auto;padding:30px 24px 60px;}
  .screen{animation:fade .5s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* Intro / Result shared */
  #intro, #result{text-align:center;padding:40px 0;}
  .seal-wrap{margin:20px 0 28px;}
  .seal{display:inline-grid;place-items:center;width:90px;height:90px;background:var(--red);color:var(--paper);font-family:"Ma Shan Zheng",serif;font-size:48px;border-radius:8px;box-shadow:0 4px 20px rgba(155,44,44,.3);}
  .pass .seal{animation:stamp .8s cubic-bezier(.2,.8,.2,1);}
  @keyframes stamp{
    0%{transform:scale(1.6) rotate(-12deg);opacity:0;}
    60%{transform:scale(1.1) rotate(2deg);opacity:1;}
    100%{transform:scale(1) rotate(0);}
  }
  .fail .seal{background:rgba(155,44,44,.25);color:rgba(255,255,255,.6);box-shadow:none;}
  #intro h1, #result h1{font-size:24px;letter-spacing:.4em;font-weight:600;margin-bottom:10px;}
  #intro .sub, #result .sub{font-size:12px;letter-spacing:.4em;color:var(--ink-soft);margin-bottom:28px;}
  .rules{list-style:none;text-align:left;max-width:360px;margin:0 auto 32px;font-size:13px;line-height:2.1;color:var(--ink-soft);padding-left:6px;}
  .btn{padding:14px 40px;font-size:14px;letter-spacing:.4em;transition:all .25s;border:1px solid var(--ink-soft);}
  .btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .btn.primary:hover{background:var(--red);border-color:var(--red);}
  .btn.ghost{background:transparent;color:var(--ink-soft);}
  .btn.ghost:hover{background:var(--ink-soft);color:var(--paper);}

  /* Quiz screen */
  .progress{height:3px;background:rgba(0,0,0,.08);position:relative;margin-bottom:36px;overflow:hidden;}
  .progress span{position:absolute;left:0;top:0;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-dark));transition:width .4s;}
  .qtag{display:inline-block;font-family:"Ma Shan Zheng",serif;font-size:18px;color:var(--red);letter-spacing:.2em;padding:4px 14px;border:1px solid var(--red);margin-bottom:24px;}
  .qbox h2{font-size:19px;line-height:2;letter-spacing:.06em;font-weight:500;margin-bottom:30px;}
  .opts{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
  .opt{padding:16px 22px;border:1px solid var(--line);background:rgba(255,255,255,.4);text-align:left;font-size:14px;letter-spacing:.05em;line-height:1.7;color:var(--ink);transition:all .25s;cursor:pointer;display:flex;align-items:flex-start;gap:14px;}
  .opt:hover{border-color:var(--ink-soft);background:rgba(255,255,255,.7);transform:translateX(4px);}
  .opt .ix{font-family:"Ma Shan Zheng",serif;color:var(--red);font-size:16px;flex-shrink:0;width:18px;}
  .opt.correct{border-color:var(--green);background:rgba(90,122,90,.13);color:var(--green);}
  .opt.correct .ix{color:var(--green);}
  .opt.wrong{border-color:var(--red);background:rgba(155,44,44,.1);color:var(--red);text-decoration:line-through;text-decoration-color:rgba(155,44,44,.5);}
  .opt.disabled{pointer-events:none;}
  .explain{margin-top:8px;padding:18px 20px;background:rgba(212,175,55,.1);border-left:3px solid var(--gold-dark);font-size:13px;line-height:2;color:var(--ink-soft);}
  .ex-title{font-size:10px;letter-spacing:.5em;color:var(--gold-dark);margin-bottom:8px;}
  .ex-link{display:inline-block;margin-top:10px;font-size:12px;color:var(--red);letter-spacing:.1em;}
  .ex-link:hover{text-decoration:underline;}
  #nextBtn{margin-top:24px;display:block;margin-left:auto;}

  /* Result */
  .reveal{margin:30px 0 28px;}
  .rh{font-size:11px;letter-spacing:.5em;color:var(--ink-soft);margin-bottom:14px;}
  .badge-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
  .badge{padding:8px 14px;font-size:11px;letter-spacing:.2em;border:1px solid var(--gold-dark);color:var(--gold-dark);}
  .badge.lit{background:var(--gold-dark);color:var(--paper);}
  .quote{font-style:italic;font-size:13px;color:var(--ink-soft);margin:30px 0;letter-spacing:.1em;}
  .actions{display:flex;justify-content:center;gap:14px;margin-top:18px;}

  @media (max-width:520px){
    .topbar{padding:14px 16px;}
    .topbar .title{font-size:12px;letter-spacing:.3em;}
    main{padding:20px 14px 40px;}
    .qbox h2{font-size:16px;}
    .opt{font-size:13px;padding:14px 16px;}
  }
  /* chapter selector */
  .chap-grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
    margin-top:22px;
  }
  .chap-card{
    display:flex;flex-direction:column;gap:6px;
    padding:18px 10px;background:rgba(0,0,0,.02);
    border:1px solid var(--c);border-radius:3px;
    cursor:pointer;transition:all .25s;
    font-family:inherit;color:var(--ink);
    text-align:center;
  }
  .chap-card:hover{transform:translateY(-3px);background:color-mix(in srgb, var(--c) 10%, transparent);}
  .chap-card.locked{opacity:.4;cursor:not-allowed;}
  .chap-card.locked:hover{transform:none;background:rgba(0,0,0,.02);}
  .chap-card .cc-tag{font-size:10px;letter-spacing:.4em;color:var(--c);font-weight:600;}
  .chap-card .cc-name{font-family:"Ma Shan Zheng",serif;font-size:24px;letter-spacing:.2em;color:var(--c);margin:4px 0;}
  .chap-card .cc-cat{font-size:10px;letter-spacing:.2em;color:var(--ink-soft);}
  .chap-card .cc-meta{margin-top:8px;font-size:10px;letter-spacing:.2em;}
  .chap-card .cc-state{padding:2px 8px;background:var(--c);color:var(--paper);border-radius:2px;font-size:9px;letter-spacing:.2em;}
  .chap-card.locked .cc-state{background:var(--ink-soft);}
  @media (max-width:560px){
    .chap-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
  <header class="topbar">
    <a href="chapters.html" class="back">← 章节</a>
    <div class="title">鉴 定 小 考</div>
    <div class="meta"><span id="chapName">卷一 · 格物</span> · <span id="qIdx">1</span>/<span id="qTotal">3</span></div>
  </header>

  <main id="quizMain">
    <section id="chapterSelect" class="screen" hidden>
      <div class="seal-wrap"><div class="seal">考</div></div>
      <h1>鉴 定 小 考</h1>
      <p class="sub">选 卷 · 拿 印</p>
      <div class="chap-grid">
        <button class="chap-card" data-c="1" style="--c:#a3812a;">
          <div class="cc-tag">卷 一</div>
          <div class="cc-name">格 物</div>
          <div class="cc-cat">硬质雕琢器物</div>
          <div class="cc-meta"><span class="cc-state">已 启</span></div>
        </button>
        <button class="chap-card" data-c="2" style="--c:#5e7c3a;">
          <div class="cc-tag">卷 二</div>
          <div class="cc-name">乘 木</div>
          <div class="cc-cat">木竹漆编织</div>
          <div class="cc-meta"><span class="cc-state">未 启</span></div>
        </button>
        <button class="chap-card" data-c="3" style="--c:#5a6c8a;">
          <div class="cc-tag">卷 三</div>
          <div class="cc-name">载 文</div>
          <div class="cc-cat">纸帛文书影像</div>
          <div class="cc-meta"><span class="cc-state">未 启</span></div>
        </button>
        <button class="chap-card" data-c="4" style="--c:#9b4a4a;">
          <div class="cc-tag">卷 四</div>
          <div class="cc-name">经 纬</div>
          <div class="cc-cat">丝麻纺织织物</div>
          <div class="cc-meta"><span class="cc-state">未 启</span></div>
        </button>
        <button class="chap-card" data-c="5" style="--c:#7a5a3a;">
          <div class="cc-tag">卷 五</div>
          <div class="cc-name">依 山</div>
          <div class="cc-cat">岩土壁塑遗存</div>
          <div class="cc-meta"><span class="cc-state">未 启</span></div>
        </button>
      </div>
      <p style="margin-top:24px;font-size:11px;letter-spacing:.3em;color:var(--ink-soft);text-align:center;">— 完成对应卷文物方可开印 —</p>
    </section>

    <section id="intro" class="screen" hidden>
      <div class="seal-wrap"><div class="seal">考</div></div>
      <h1 id="introTitle">卷 一 · 鉴 定</h1>
      <p class="sub">三题随抽 · 全对方可拿印</p>
      <ul class="rules">
        <li>· 题目来自本卷已修复文物的知识卡</li>
        <li>· 答错可继续，但本次不获印章</li>
        <li>· 答错的题会指出对应卡片，便于复习</li>
      </ul>
      <button id="startBtn" class="btn primary">开 始</button>
    </section>

    <section id="quiz" class="screen" hidden>
      <div class="progress"><span id="pbar"></span></div>
      <div class="qbox">
        <div class="qtag" id="qtag">问 · 一</div>
        <h2 id="qtext">题干加载中…</h2>
        <div class="opts" id="opts"></div>
        <div class="explain" id="explain" hidden>
          <div class="ex-title" id="exTitle">说 · 明</div>
          <p id="exBody"></p>
          <a id="exLink" href="#" class="ex-link" hidden>→ 回到这张知识卡</a>
        </div>
        <button id="nextBtn" class="btn primary" hidden>下 一 题</button>
      </div>
    </section>

    <section id="result" class="screen" hidden>
      <div class="seal-wrap pass" id="resultSeal"><div class="seal">印</div></div>
      <h1 id="resultTitle">— 卷 一 印 —</h1>
      <p class="sub" id="resultSub">三 题 全 对</p>

      <div class="reveal" id="reveal">
        <div class="rh">本 卷 收 藏</div>
        <div id="badgeRow" class="badge-row"></div>
      </div>

      <div class="quote" id="quote">"考的不是知识，是惜物之心。"</div>

      <div class="actions">
        <button id="redoBtn" class="btn ghost">再 来 一 次</button>
        <button id="homeBtn" class="btn primary">回 章 节</button>
      </div>
    </section>
  </main>

<script>
(()=>{
  // ============ Question bank by chapter ============
  const BANK = {
    "1": {
      name: "卷一 · 格物",
      sub:  "硬质雕琢器物类",
      items: ["qinghua-bowl","longquan-cup","bronze-jue","yu-huang","sancai-horse"],
      questions: [
        {
          q: "「金缮」这门以金漆补瓷的工艺，最初成熟于哪国？",
          opts: ["中国宋代", "日本室町时代", "朝鲜高丽", "越南阮朝"],
          a: 1,
          ex: "金缮（Kintsugi）成熟于日本室町时代，以漆补合、以金粉饰缝，把破损本身视为文物的新身份。",
          ref: { id:"qinghua-bowl", label:"青花碗 · 金缮", href:"level1.html" }
        },
        {
          q: "南宋时被弃如敝屣运至日本、却被日本人取名「马蝗绊」的，是下面哪件文物的同类？",
          opts: ["龙泉粉青盏", "青花碗", "司母戊鼎", "唐三彩马"],
          a: 0,
          ex: "马蝗绊是足利将军家旧藏的龙泉青瓷茶碗，因锔钉形似马蝗（蚂蟥）得名，现藏东京国立博物馆，为重要文化财。",
          ref: { id:"longquan-cup", label:"龙泉粉青盏 · 锔瓷", href:"level2.html" }
        },
        {
          q: "「没有金刚钻」的下一句是？",
          opts: ["难修古青铜", "别揽瓷器活", "不接精细活", "别做修复人"],
          a: 1,
          ex: "「没有金刚钻，别揽瓷器活」源于锔瓷行当——金刚钻钻头能在瓷器上钻浅孔而不致碎裂，是匠人的硬功夫与底气。",
          ref: { id:"longquan-cup", label:"龙泉粉青盏 · 锔瓷", href:"level2.html" }
        },
        {
          q: "司母戊鼎的鼎身重量大约是？",
          opts: ["432 公斤", "632 公斤", "832 公斤", "1032 公斤"],
          a: 2,
          ex: "司母戊鼎（现称后母戊鼎）重 832.84 公斤，是商代青铜器之冠，1939 年于河南安阳出土。",
          ref: { id:"bronze-jue", label:"青铜爵 · 化学清洗", href:"level3.html" }
        },
        {
          q: "古青铜器的化学清洗，下列哪一项<b>不是</b>它的目的？",
          opts: ["剥离活性锈", "保留稳定氧化层", "让纹饰与铭文重见天日", "把器物擦得锃亮"],
          a: 3,
          ex: "古青铜器若擦得锃亮反而失去时间感与韵味。清洗讲究「选择性」——除害锈，留古意。",
          ref: { id:"bronze-jue", label:"青铜爵 · 化学清洗", href:"level3.html" }
        },
        {
          q: "「司母戊」三字铭文，是什么时候发现的？",
          opts: ["1939 年出土时", "1949 年随军南运时", "1959 年入藏后修复人员清洗发现", "1976 年安阳考古队复查时"],
          a: 2,
          ex: "鼎 1939 年出土时锈土覆满，1959 年入藏中国历史博物馆后，修复人员用三年逐层清洗，才在内壁辨出「司母戊」三字。",
          ref: { id:"bronze-jue", label:"青铜爵 · 化学清洗", href:"level3.html" }
        }
      ]
    },
    "2": { name:"卷二 · 乘木", sub:"木竹漆编织类", items:[], questions:[] },
    "3": { name:"卷三 · 载文", sub:"纸帛文书影像类", items:[], questions:[] },
    "4": { name:"卷四 · 经纬", sub:"丝麻纺织织物类", items:[], questions:[] },
    "5": { name:"卷五 · 依山", sub:"岩土壁塑遗存类", items:[], questions:[] }
  };

  // ============ State ============
  const params = new URLSearchParams(location.search);
  const hasParam = params.has("chapter");
  const chapter = params.get("chapter") || "1";
  const data = BANK[chapter] || BANK["1"];

  // If no ?chapter param → show chapter selector first
  if(!hasParam){
    document.getElementById("intro").hidden = true;
    document.getElementById("chapterSelect").hidden = false;
    // restored counts → enable cards
    function safeLocal(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    const restored = {
      "1": ["qinghua-bowl","longquan-cup","bronze-jue","yu-huang","sancai-horse"].filter(id=>!!safeLocal("restored."+id)).length,
      "2": 0, "3": 0, "4": 0, "5": 0
    };
    document.querySelectorAll(".chap-card").forEach(btn=>{
      const c = btn.dataset.c;
      const bank = BANK[c];
      const ready = bank && bank.questions.length > 0; // 题库非空
      if(!ready){
        btn.classList.add("locked");
        btn.querySelector(".cc-state").textContent = "未 启";
        btn.addEventListener("click", ()=>{
          alert("卷 " + "一二三四五"[+c-1] + " 待开放 · 待该卷文物上架后开启鉴定。");
        });
      } else {
        btn.querySelector(".cc-state").textContent = restored[c] ? "可 考" : "已 启";
        btn.addEventListener("click", ()=>{ location.href = "quiz.html?chapter=" + c; });
      }
    });
    return; // skip the rest of init
  }

  document.getElementById("intro").hidden = false;
  document.getElementById("chapName").textContent = data.name;
  document.getElementById("introTitle").textContent = data.name.split(" · ").shift() + " · 鉴 定";

  if(!data.questions.length){
    // chapter not yet implemented
    document.getElementById("intro").innerHTML = `
      <div class="seal-wrap"><div class="seal" style="background:rgba(155,44,44,.25)">未</div></div>
      <h1>本 卷 尚 未 开 启</h1>
      <p class="sub">${data.sub}</p>
      <ul class="rules">
        <li>· 待本卷文物全部上架后开放鉴定</li>
        <li>· 也可先去 <a href="chapters.html" style="color:var(--red);text-decoration:underline">章节首页</a> 查看进度</li>
      </ul>
      <a href="chapters.html" class="btn primary" style="display:inline-block">回 章 节</a>`;
  }

  // sample 3 questions
  function pickThree(){
    const pool = [...data.questions];
    const out = [];
    while(out.length<3 && pool.length){
      const i = Math.floor(Math.random()*pool.length);
      out.push(pool.splice(i,1)[0]);
    }
    return out;
  }
  let quiz = pickThree();
  let idx = 0, correct = 0;
  document.getElementById("qTotal").textContent = quiz.length;

  // ============ Audio (light) ============
  let actx = null;
  function aud(){ if(actx) return actx; const C=window.AudioContext||window.webkitAudioContext; actx=new C(); return actx;}
  function ding(freq=880, dur=.6, vol=.08){
    const c=aud(); const o=c.createOscillator(); o.type="sine"; o.frequency.value=freq;
    const g=c.createGain(); g.gain.value=0; o.connect(g).connect(c.destination);
    const t=c.currentTime; g.gain.linearRampToValueAtTime(vol,t+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur+.05);
  }
  function buzz(){ // wrong answer — soft, not punitive
    const c=aud(); const o=c.createOscillator(); o.type="triangle"; o.frequency.value=180;
    const g=c.createGain(); g.gain.value=0; o.connect(g).connect(c.destination);
    const t=c.currentTime; g.gain.linearRampToValueAtTime(.06,t+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+.4); o.start(t); o.stop(t+.45);
  }
  function stampSound(){
    [523.25, 659.25, 783.99].forEach((f,i)=>setTimeout(()=>ding(f,.9,.10), i*180));
  }

  // ============ Render question ============
  const optsEl = document.getElementById("opts");
  const explainEl = document.getElementById("explain");
  const nextBtn = document.getElementById("nextBtn");

  function renderQ(){
    window._reviveUsed = false; // 每题给一次翻签机会
    const q = quiz[idx];
    document.getElementById("qIdx").textContent = idx+1;
    document.getElementById("qtag").textContent = ["问 · 一","问 · 二","问 · 三"][idx] || `问 · ${idx+1}`;
    document.getElementById("qtext").innerHTML = q.q;
    document.getElementById("pbar").style.width = ((idx)/quiz.length*100)+"%";
    optsEl.innerHTML = "";
    explainEl.hidden = true;
    nextBtn.hidden = true;
    const marks = ["甲","乙","丙","丁"];
    q.opts.forEach((text,i)=>{
      const b = document.createElement("button");
      b.className = "opt";
      b.innerHTML = `<span class="ix">${marks[i]}</span><span class="tx">${text}</span>`;
      b.addEventListener("click", ()=>pick(i,b));
      optsEl.appendChild(b);
    });
  }
  function pick(i, btn){
    const q = quiz[idx];
    const all = optsEl.querySelectorAll(".opt");
    all.forEach(o=>o.classList.add("disabled"));
    if(i===q.a){
      btn.classList.add("correct");
      correct++;
      ding(880, .5, .09);
      proceedAfterAnswer(q);
      return;
    }
    btn.classList.add("wrong");
    buzz();
    // 翻签 · 救一次
    const usedRevive = !!window._reviveUsed;
    if(window.Ad && !usedRevive){
      Ad.openRevive({
        onRevive: ()=>{
          window._reviveUsed = true;
          // 重置当前题
          btn.classList.remove("wrong","disabled");
          all.forEach(o=>o.classList.remove("disabled"));
          ding(660, .3, .07);
        },
        onGiveUp: ()=>{
          all[q.a].classList.add("correct");
          proceedAfterAnswer(q);
        }
      });
    } else {
      all[q.a].classList.add("correct");
      proceedAfterAnswer(q);
    }
  }
  function proceedAfterAnswer(q){
    // explain
    document.getElementById("exBody").textContent = q.ex;
    if(q.ref){
      const lnk = document.getElementById("exLink");
      lnk.textContent = `→ 回到「${q.ref.label}」复习`;
      lnk.href = q.ref.href;
      lnk.hidden = false;
    } else {
      document.getElementById("exLink").hidden = true;
    }
    explainEl.hidden = false;
    nextBtn.hidden = false;
    nextBtn.textContent = (idx === quiz.length-1) ? "看 结 果" : "下 一 题";
    document.getElementById("pbar").style.width = ((idx+1)/quiz.length*100)+"%";
  }
  nextBtn.addEventListener("click", ()=>{
    idx++;
    if(idx >= quiz.length){ showResult(); return; }
    renderQ();
  });

  // ============ Result ============
  function showResult(){
    document.getElementById("quiz").hidden = true;
    const r = document.getElementById("result");
    r.hidden = false;
    const pass = (correct === quiz.length);
    const sealEl = document.getElementById("resultSeal");
    sealEl.classList.remove("pass","fail");
    sealEl.classList.add(pass ? "pass" : "fail");
    sealEl.querySelector(".seal").textContent = pass ? "印" : "再";

    document.getElementById("resultTitle").textContent = pass ? `— ${data.name.split(" · ").shift()} 印 —` : `— ${correct} / ${quiz.length} —`;
    document.getElementById("resultSub").textContent = pass ? "三 题 全 对 · 印 章 已 入 谱" : "未 满 三 题 · 可 再 来 一 次";

    // badges row — show items in this chapter
    const badgeRow = document.getElementById("badgeRow");
    badgeRow.innerHTML = "";
    const itemNames = {
      "qinghua-bowl":"青花碗",
      "longquan-cup":"龙泉盏",
      "bronze-jue":"青铜爵",
      "yu-huang":"战国玉璜",
      "sancai-horse":"唐三彩马"
    };
    data.items.forEach(id=>{
      const restored = !!safeLocal("restored."+id);
      const b = document.createElement("span");
      b.className = "badge" + (restored ? " lit" : "");
      b.textContent = itemNames[id] || id;
      badgeRow.appendChild(b);
    });

    document.getElementById("quote").textContent = pass
      ? `"考的不是知识，是惜物之心。"`
      : `"修复的路本就是慢的，错一题不丢人。"`;

    if(pass){
      try{ localStorage.setItem("sigil.chapter"+chapter, "1"); }catch(_){}
      setTimeout(stampSound, 200);
    }
  }

  function safeLocal(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }

  // ============ Wire ============
  document.getElementById("startBtn") && document.getElementById("startBtn").addEventListener("click", ()=>{
    aud(); if(actx.state==="suspended") actx.resume();
    document.getElementById("intro").hidden = true;
    document.getElementById("quiz").hidden = false;
    renderQ();
  });
  document.getElementById("redoBtn") && document.getElementById("redoBtn").addEventListener("click", ()=>{
    quiz = pickThree(); idx = 0; correct = 0;
    document.getElementById("qTotal").textContent = quiz.length;
    document.getElementById("result").hidden = true;
    document.getElementById("quiz").hidden = false;
    renderQ();
  });
  document.getElementById("homeBtn") && document.getElementById("homeBtn").addEventListener("click", ()=>{
    location.href = "chapters.html";
  });
})();
</script>
</body>
</html>
